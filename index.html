<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineReel — Αναζήτηση Ταινιών &amp; Σειρών</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0d10;
    --bg-raised:#15181d;
    --card:#1b1f26;
    --line:#2a2f38;
    --gold:#e8b34a;
    --gold-dim:#a67f2f;
    --teal:#5a9aa1;
    --text:#f2ede1;
    --text-dim:#9aa0ab;
    --danger:#c96a5a;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(232,179,74,0.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:32px 20px 80px;}

  header{
    display:flex;flex-direction:column;gap:6px;margin-bottom:28px;
    border-bottom:1px solid var(--line);padding-bottom:22px;
  }
  .brand{display:flex;align-items:baseline;gap:12px;}
  .brand .reel{font-family:'IBM Plex Mono';font-size:12px;letter-spacing:3px;color:var(--gold-dim);text-transform:uppercase;}
  h1{
    font-family:'Fraunces', serif;font-weight:700;font-size:40px;margin:0;
    letter-spacing:-0.5px;
  }
  h1 span{color:var(--gold);font-style:italic;font-weight:600;}
  .tagline{color:var(--text-dim);font-size:14px;margin:0;}

  .keys{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;
  }
  .keys input{
    background:var(--bg-raised);border:1px solid var(--line);color:var(--text);
    padding:10px 12px;border-radius:8px;font-family:'IBM Plex Mono';font-size:12px;
  }
  .keys label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px;}
  .keys .field{display:flex;flex-direction:column;}
  .keyshelp{font-size:12px;color:var(--text-dim);margin-top:8px;line-height:1.5;}
  .keyshelp a{color:var(--teal);}

  .controls{
    display:flex;flex-wrap:wrap;gap:12px;align-items:end;margin:26px 0 8px;
    background:var(--bg-raised);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px;
  }
  .field label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;}
  .field input[type=text], .field select, .field input[type=number]{
    background:#0f1216;border:1px solid var(--line);color:var(--text);
    padding:9px 10px;border-radius:7px;font-family:'IBM Plex Sans';font-size:13.5px;min-width:130px;
  }
  .field input[type=number]{min-width:100px;}
  .keystatus{font-size:11.5px;color:var(--teal);margin-top:6px;min-height:16px;}
  .field input[type=text]{min-width:220px;}
  .field.grow{flex:1;}
  .genre-chips{display:flex;flex-wrap:wrap;gap:6px;max-width:420px;}
  .genre-filter-btn{
    background:var(--bg-raised);border:1px solid var(--line);color:var(--text);
    padding:9px 14px;border-radius:7px;font-size:13px;cursor:pointer;font-family:'IBM Plex Sans';
  }
  .genre-filter-btn:hover{border-color:var(--gold-dim);}
  #genreFilterCount{color:var(--gold);font-family:'IBM Plex Mono';}
  .genre-chips-panel{
    position:absolute;top:calc(100% + 6px);left:0;z-index:20;background:var(--bg-raised);
    border:1px solid var(--line);border-radius:10px;padding:14px;max-width:460px;
    box-shadow:0 12px 30px rgba(0,0,0,0.4);
  }
  .genre-chips-panel.hidden{display:none;}
  .chip{
    border:1px solid var(--line);padding:6px 12px;border-radius:999px;font-size:12.5px;
    cursor:pointer;color:var(--text-dim);user-select:none;transition:all .15s;
  }
  .chip:hover{border-color:var(--gold-dim);color:var(--text);}
  .chip.active{background:var(--gold);border-color:var(--gold);color:#1a1200;font-weight:600;}
  .range-row{display:flex;align-items:center;gap:8px;}
  .range-row input[type=range]{accent-color:var(--gold);width:130px;}
  .range-val{font-family:'IBM Plex Mono';font-size:12.5px;color:var(--gold);min-width:28px;}
  button.go{
    background:var(--gold);color:#1a1200;border:none;padding:10px 22px;border-radius:7px;
    font-weight:600;cursor:pointer;font-size:13.5px;letter-spacing:.3px;
  }
  button.go:hover{background:#f0c165;}
  button.go:disabled{opacity:.5;cursor:default;}

  .meta-row{display:flex;justify-content:space-between;align-items:center;margin:22px 0 14px;}
  .meta-row .count{color:var(--text-dim);font-size:13px;font-family:'IBM Plex Mono';}
  .sortfield select{background:var(--bg-raised);border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:7px;font-size:12.5px;}

  .view-toggle{display:flex;gap:4px;background:var(--bg-raised);border:1px solid var(--line);border-radius:7px;padding:3px;}
  .view-toggle button{
    background:transparent;border:none;color:var(--text-dim);padding:6px 12px;border-radius:5px;
    cursor:pointer;font-size:12.5px;font-family:'IBM Plex Sans';
  }
  .view-toggle button.active{background:var(--gold);color:#1a1200;font-weight:600;}

  .toggle-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-dim);}
  .toggle-row input{accent-color:var(--gold);width:15px;height:15px;cursor:pointer;}
  .toggle-row label{cursor:pointer;}

  .grid{
    display:grid;grid-template-columns:repeat(auto-fill, minmax(190px, 1fr));gap:20px;
  }
  .grid.list-mode{
    display:flex;flex-direction:column;gap:8px;
  }
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
    display:flex;flex-direction:column;transition:transform .18s, border-color .18s;cursor:pointer;
  }
  .card:hover{transform:translateY(-3px);border-color:var(--gold-dim);}
  .rank{display:none;}

  .list-mode .card{
    flex-direction:row;align-items:center;transform:none !important;
    padding:8px 16px 8px 8px;gap:14px;
  }
  .list-mode .card:hover{transform:none !important;border-color:var(--gold-dim);}
  .list-mode .rank{
    display:flex;align-items:center;justify-content:center;flex:0 0 34px;
    font-family:'IBM Plex Mono';font-weight:600;color:var(--text-dim);font-size:14px;
  }
  .list-mode .poster-wrap{width:50px;flex:0 0 50px;aspect-ratio:2/3;border-radius:6px;overflow:hidden;}
  .list-mode .badges{display:none;}
  .list-mode .card-body{
    flex-direction:row;align-items:center;padding:0;flex:1;gap:0;min-width:0;
  }
  .list-mode .card-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
  .list-mode .card-title{
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px;
  }
  .list-mode .card-sub{
    display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--text-dim);
  }
  .list-mode .card-type{margin-top:0;}
  .list-mode .rating-box{
    flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:2px;margin-left:14px;
  }
  .list-mode .rating-line{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono';font-size:13px;white-space:nowrap;}
  .list-mode .rating-line .star{color:var(--gold);}
  .list-mode .rating-line.imdb-line{color:var(--gold);font-weight:600;}
  .list-mode .rating-line.tmdb-line{color:var(--teal);font-size:11.5px;}

  .poster-wrap{position:relative;aspect-ratio:2/3;background:#0f1216;}
  .poster-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
  .poster-wrap .noimg{
    display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);
    font-family:'Fraunces';font-style:italic;font-size:13px;text-align:center;padding:10px;
  }
  .badges{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;gap:6px;}
  .badge{
    font-family:'IBM Plex Mono';font-size:11px;font-weight:600;padding:3px 7px;border-radius:5px;
    backdrop-filter:blur(4px);display:flex;align-items:center;gap:4px;
  }
  .badge.imdb{background:rgba(232,179,74,0.92);color:#1a1200;}
  .badge.tmdb{background:rgba(90,154,161,0.88);color:#081516;}
  .badge.pending{background:rgba(255,255,255,0.12);color:var(--text-dim);}
  .rating-box{display:none;}
  .card-body{padding:12px 13px 14px;display:flex;flex-direction:column;gap:5px;flex:1;}
  .card-title{font-family:'Fraunces';font-weight:600;font-size:15.5px;line-height:1.25;}
  .card-sub{font-size:12px;color:var(--text-dim);font-family:'IBM Plex Mono';}
  .card-type{
    align-self:flex-start;font-size:10px;text-transform:uppercase;letter-spacing:1px;
    color:var(--teal);border:1px solid rgba(90,154,161,0.4);padding:2px 6px;border-radius:4px;margin-top:2px;
  }

  .state{padding:60px 20px;text-align:center;color:var(--text-dim);}
  .state .icon{font-size:32px;margin-bottom:10px;}
  .state.error{color:var(--danger);}

  .load-more-row{display:flex;justify-content:center;margin-top:28px;}
  button.loadmore{
    background:transparent;border:1px solid var(--gold-dim);color:var(--gold);padding:10px 26px;border-radius:7px;
    font-weight:600;cursor:pointer;font-size:13px;letter-spacing:.3px;
  }
  button.loadmore:hover{background:rgba(232,179,74,0.1);}
  button.loadmore:disabled{opacity:.5;cursor:default;}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(5,6,8,0.82);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal-overlay.hidden{display:none;}
  .modal{
    background:var(--card);border:1px solid var(--line);border-radius:14px;max-width:640px;width:100%;
    max-height:86vh;overflow-y:auto;position:relative;
  }
  .modal-close{
    position:absolute;top:12px;right:14px;background:rgba(0,0,0,0.4);border:none;color:var(--text);
    width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;z-index:2;
  }
  .modal-hero{display:flex;gap:18px;padding:22px;border-bottom:1px solid var(--line);}
  .modal-hero img{width:120px;border-radius:8px;flex:0 0 120px;}
  .modal-hero .noimg{width:120px;height:180px;flex:0 0 120px;background:#0f1216;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-family:'Fraunces';font-style:italic;font-size:12px;text-align:center;padding:6px;}
  .modal-title{font-family:'Fraunces';font-weight:700;font-size:22px;margin:0 0 4px;}
  .modal-greek-title{font-size:12px;color:var(--text-dim);margin-bottom:8px;font-style:italic;}
  .modal-meta{font-family:'IBM Plex Mono';font-size:12px;color:var(--text-dim);margin-bottom:10px;}
  .modal-badges{display:flex;gap:8px;margin-bottom:10px;}
  .modal-genres{font-size:12px;color:var(--teal);}
  .modal-body{padding:20px 22px;}
  .modal-overview{font-size:14px;line-height:1.6;color:var(--text);}
  .modal-loading{padding:40px;text-align:center;color:var(--text-dim);}

  footer{margin-top:50px;color:var(--text-dim);font-size:11.5px;text-align:center;font-family:'IBM Plex Mono';}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <span class="reel">● REC</span>
      <h1>Cine<span>Reel</span></h1>
    </div>
    <p class="tagline">Αναζήτηση ταινιών &amp; σειρών με φίλτρα είδους, χρονιάς και βαθμολογίας IMDb.</p>
  </header>

  <div class="controls">
    <div class="field grow">
      <label for="query">Αναζήτηση τίτλου (προαιρετικό)</label>
      <input type="text" id="query" placeholder="π.χ. Dune, Breaking Bad...">
    </div>
    <div class="field">
      <label for="mediaType">Τύπος</label>
      <select id="mediaType">
        <option value="movie">Ταινίες</option>
        <option value="tv">Σειρές</option>
      </select>
    </div>
    <div class="field">
      <label for="yearFrom">Από έτος</label>
      <input type="number" id="yearFrom" placeholder="π.χ. 2015" min="1900" max="2030">
    </div>
    <div class="field">
      <label for="yearTo">Έως έτος</label>
      <input type="number" id="yearTo" placeholder="π.χ. 2026" min="1900" max="2030">
    </div>
    <div class="field">
      <label>Ελάχιστο IMDb-style rating (TMDb)</label>
      <div class="range-row">
        <input type="range" id="minRating" min="0" max="9" step="0.5" value="0">
        <span class="range-val" id="minRatingVal">0.0</span>
      </div>
    </div>
    <div class="field">
      <label>Ταξινόμηση</label>
      <select id="sortBy">
        <option value="popularity.desc">Δημοφιλία</option>
        <option value="vote_average.desc">Βαθμολογία (TMDb)</option>
        <option value="primary_release_date.desc">Νεότερες</option>
      </select>
    </div>
    <button class="go" id="goBtn">Αναζήτηση</button>
  </div>

  <div class="field" style="margin:14px 2px;position:relative;">
    <button type="button" id="genreFilterBtn" class="genre-filter-btn">Είδη <span id="genreFilterCount"></span> ▾</button>
    <div class="genre-chips-panel hidden" id="genreChipsPanel">
      <div class="genre-chips" id="genreChips"></div>
    </div>
  </div>

  <div class="toggle-row" style="margin:10px 2px;">
    <input type="checkbox" id="showIndianKorean">
    <label for="showIndianKorean">Εμφάνιση Ινδικών &amp; Κορεατικών τίτλων (κρυμμένα από προεπιλογή)</label>
  </div>

  <div class="meta-row">
    <span class="count" id="resultCount"></span>
    <div class="view-toggle">
      <button id="viewListBtn" class="active">☰ Λίστα</button>
      <button id="viewGridBtn">▦ Πλακίδια</button>
    </div>
  </div>

  <div id="results" class="grid list-mode"></div>

  <div class="load-more-row" id="loadMoreRow" style="display:none;">
    <button class="loadmore" id="loadMoreBtn">Φόρτωση περισσότερων</button>
  </div>

</div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div id="modalContent"><div class="modal-loading">Φόρτωση...</div></div>
  </div>
</div>

<footer>CineReel — δεδομένα από TMDb &amp; OMDb (IMDb ratings). Προσωπικό εργαλείο, όχι επίσημη εφαρμογή.</footer>

<script>
const TMDB_API_KEY = '4239ea4fdcba7a007d399f16f3e31207';
const OMDB_API_KEY = 'd70891e6';

const HIDDEN_LANGS = ['hi','ta','te','ml','kn','bn','pa','mr','gu','ko']; // Ινδικές γλώσσες + Κορεατικά

const state = {
  genres: {},
  selectedGenres: new Set(),
  mediaType: 'movie',
  viewMode: 'list',
  currentPage: 1,
  totalPages: 1,
  lastQuery: '',
  lastResults: [],
};

const els = {
  query: document.getElementById('query'),
  mediaType: document.getElementById('mediaType'),
  dateFrom: document.getElementById('yearFrom'),
  dateTo: document.getElementById('yearTo'),
  minRating: document.getElementById('minRating'),
  minRatingVal: document.getElementById('minRatingVal'),
  sortBy: document.getElementById('sortBy'),
  goBtn: document.getElementById('goBtn'),
  genreChips: document.getElementById('genreChips'),
  genreFilterBtn: document.getElementById('genreFilterBtn'),
  genreChipsPanel: document.getElementById('genreChipsPanel'),
  genreFilterCount: document.getElementById('genreFilterCount'),
  results: document.getElementById('results'),
  resultCount: document.getElementById('resultCount'),
  showIndianKorean: document.getElementById('showIndianKorean'),
  viewListBtn: document.getElementById('viewListBtn'),
  viewGridBtn: document.getElementById('viewGridBtn'),
  loadMoreRow: document.getElementById('loadMoreRow'),
  loadMoreBtn: document.getElementById('loadMoreBtn'),
  modalOverlay: document.getElementById('modalOverlay'),
  modalContent: document.getElementById('modalContent'),
  modalClose: document.getElementById('modalClose'),
};

function applyViewMode(){
  if(state.viewMode === 'list'){
    els.results.classList.add('list-mode');
    els.viewListBtn.classList.add('active');
    els.viewGridBtn.classList.remove('active');
  } else {
    els.results.classList.remove('list-mode');
    els.viewGridBtn.classList.add('active');
    els.viewListBtn.classList.remove('active');
  }
}
els.viewListBtn.addEventListener('click', () => { state.viewMode = 'list'; applyViewMode(); });
els.viewGridBtn.addEventListener('click', () => { state.viewMode = 'grid'; applyViewMode(); });
els.genreFilterBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  els.genreChipsPanel.classList.toggle('hidden');
});
document.addEventListener('click', (e) => {
  if(!els.genreChipsPanel.contains(e.target) && e.target !== els.genreFilterBtn){
    els.genreChipsPanel.classList.add('hidden');
  }
});
function updateGenreFilterCount(){
  els.genreFilterCount.textContent = state.selectedGenres.size ? `(${state.selectedGenres.size})` : '';
}
els.showIndianKorean.addEventListener('change', runSearch);
els.modalClose.addEventListener('click', closeModal);
els.modalOverlay.addEventListener('click', (e) => { if(e.target === els.modalOverlay) closeModal(); });

els.minRating.addEventListener('input', () => {
  els.minRatingVal.textContent = parseFloat(els.minRating.value).toFixed(1);
});

els.mediaType.addEventListener('change', async () => {
  state.mediaType = els.mediaType.value;
  state.selectedGenres.clear();
  await loadGenres();
});

async function tmdbFetch(path, params={}){
  const url = new URL(`https://api.themoviedb.org/3${path}`);
  url.searchParams.set('api_key', TMDB_API_KEY);
  url.searchParams.set('language', params.language || 'el-GR');
  for(const [k,v] of Object.entries(params)){
    if(k === 'language') continue;
    if(v !== '' && v !== undefined && v !== null) url.searchParams.set(k, v);
  }
  const res = await fetch(url);
  if(!res.ok) throw new Error('TMDB_ERROR_' + res.status);
  return res.json();
}

async function loadGenres(){
  els.genreChips.innerHTML = '<span style="color:var(--text-dim);font-size:12px;">Φόρτωση ειδών...</span>';
  try{
    const data = await tmdbFetch(`/genre/${state.mediaType}/list`);
    state.genres = {};
    data.genres.forEach(g => state.genres[g.id] = g.name);
    renderGenreChips();
  }catch(e){
    els.genreChips.innerHTML = '<span style="color:var(--text-dim);font-size:12px;">Δεν φορτώθηκαν τα είδη — δοκίμασε ανανέωση σελίδας.</span>';
  }
}

function renderGenreChips(){
  els.genreChips.innerHTML = '';
  Object.entries(state.genres).forEach(([id, name]) => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (state.selectedGenres.has(id) ? ' active' : '');
    chip.textContent = name;
    chip.onclick = () => {
      if(state.selectedGenres.has(id)) state.selectedGenres.delete(id);
      else state.selectedGenres.add(id);
      renderGenreChips();
      updateGenreFilterCount();
    };
    els.genreChips.appendChild(chip);
  });
}

function posterUrl(path){
  return path ? `https://image.tmdb.org/t/p/w342${path}` : null;
}

function renderResultsSkeleton(items, append=false){
  if(!append) { els.results.innerHTML = ''; state.rankCounter = (state.currentPage - 1) * 20; }
  items.forEach(item => {
    state.rankCounter = (state.rankCounter || 0) + 1;
    const rank = state.rankCounter;
    const title = item.title || item.name || 'Άγνωστος τίτλος';
    const date = item.release_date || item.first_air_date || '';
    const year = date ? date.slice(0,4) : '—';
    const poster = posterUrl(item.poster_path);
    const voteCount = item.vote_count ? formatVoteCount(item.vote_count) : '';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="rank">#${rank}</div>
      <div class="poster-wrap">
        ${poster ? `<img src="${poster}" alt="${title}" loading="lazy">` : `<div class="noimg">Χωρίς αφίσα<br>${title}</div>`}
        <div class="badges">
          <span class="badge tmdb" title="Βαθμολογία TMDb">★ ${item.vote_average ? item.vote_average.toFixed(1) : '—'}</span>
          <span class="badge pending" data-imdb-slot="${item.id}">IMDb…</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-main">
          <div class="card-title">${title}</div>
          <div class="card-sub">
            <span>${year}</span>
            <span class="card-type">${state.mediaType === 'movie' ? 'Ταινία' : 'Σειρά'}</span>
          </div>
        </div>
        <div class="rating-box">
          <div class="rating-line imdb-line" data-imdb-line="${item.id}"><span class="star">★</span> IMDb …</div>
          <div class="rating-line tmdb-line">TMDb ${item.vote_average ? item.vote_average.toFixed(1) : '—'}${voteCount ? ` · ${voteCount}` : ''}</div>
        </div>
      </div>
    `;
    card.addEventListener('click', () => openModal(item.id, title));
    els.results.appendChild(card);
  });
}

function formatVoteCount(n){
  if(n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if(n >= 1000) return (n/1000).toFixed(0) + 'K';
  return String(n);
}

async function fetchImdbRating(tmdbId){
  try{
    const extUrl = `https://api.themoviedb.org/3/${state.mediaType}/${tmdbId}/external_ids?api_key=${TMDB_API_KEY}`;
    const extRes = await fetch(extUrl);
    const ext = await extRes.json();
    const imdbId = ext.imdb_id;
    if(!imdbId) return null;
    const omdbRes = await fetch(`https://www.omdbapi.com/?i=${imdbId}&apikey=${OMDB_API_KEY}`);
    const omdbData = await omdbRes.json();
    return omdbData.imdbRating && omdbData.imdbRating !== 'N/A' ? omdbData.imdbRating : null;
  }catch(e){
    return null;
  }
}

async function enrichWithImdb(items){
  // limit concurrency a bit by batching
  for(const item of items){
    fetchImdbRating(item.id).then(rating => {
      const slot = document.querySelector(`[data-imdb-slot="${item.id}"]`);
      const line = document.querySelector(`[data-imdb-line="${item.id}"]`);
      const text = rating ? `IMDb ${rating}` : 'IMDb —';
      if(slot){
        slot.textContent = text;
        if(rating){ slot.classList.remove('pending'); slot.classList.add('imdb'); }
      }
      if(line){
        line.innerHTML = `<span class="star">★</span> ${text}`;
      }
    });
  }
}

async function openModal(tmdbId, englishTitle){
  els.modalOverlay.classList.remove('hidden');
  els.modalContent.innerHTML = '<div class="modal-loading">Φόρτωση...</div>';
  try{
    const details = await tmdbFetch(`/${state.mediaType}/${tmdbId}`, { append_to_response: 'external_ids' });
    const greekTitle = details.title || details.name;
    const title = englishTitle || greekTitle;
    const date = details.release_date || details.first_air_date || '';
    const year = date ? date.slice(0,4) : '—';
    const poster = posterUrl(details.poster_path);
    const genres = (details.genres || []).map(g => g.name).join(' · ');
    const runtime = state.mediaType === 'movie'
      ? (details.runtime ? `${details.runtime} λεπτά` : '—')
      : (details.number_of_seasons ? `${details.number_of_seasons} σεζόν, ${details.number_of_episodes || '?'} επεισόδια` : '—');
    const imdbId = details.external_ids && details.external_ids.imdb_id;
    const showGreekTitle = greekTitle && greekTitle !== title;

    els.modalContent.innerHTML = `
      <div class="modal-hero">
        ${poster ? `<img src="${poster}" alt="${title}">` : `<div class="noimg">Χωρίς αφίσα</div>`}
        <div>
          <div class="modal-title">${title}</div>
          ${showGreekTitle ? `<div class="modal-greek-title">Ελληνικός τίτλος: ${greekTitle}</div>` : ''}
          <div class="modal-meta">${year} · ${runtime}</div>
          <div class="modal-badges">
            <span class="badge tmdb">★ TMDb ${details.vote_average ? details.vote_average.toFixed(1) : '—'}</span>
            <span class="badge pending" id="modalImdbBadge">IMDb…</span>
          </div>
          <div class="modal-genres">${genres || ''}</div>
        </div>
      </div>
      <div class="modal-body">
        <div class="modal-overview">${details.overview || 'Δεν υπάρχει διαθέσιμη περίληψη.'}</div>
      </div>
    `;

    if(imdbId){
      fetch(`https://www.omdbapi.com/?i=${imdbId}&apikey=${OMDB_API_KEY}`)
        .then(r => r.json())
        .then(d => {
          const badge = document.getElementById('modalImdbBadge');
          if(!badge) return;
          if(d.imdbRating && d.imdbRating !== 'N/A'){
            badge.textContent = `IMDb ${d.imdbRating}`;
            badge.classList.remove('pending');
            badge.classList.add('imdb');
          } else {
            badge.textContent = 'IMDb —';
          }
        }).catch(() => {});
    }
  }catch(e){
    els.modalContent.innerHTML = '<div class="modal-loading">Δεν φορτώθηκαν οι λεπτομέρειες. Δοκίμασε ξανά.</div>';
  }
}

function closeModal(){
  els.modalOverlay.classList.add('hidden');
}

function setState(mode, msg){
  if(mode === 'loading'){
    els.results.innerHTML = `<div class="state"><div class="icon">🎞️</div>${msg || 'Αναζήτηση...'}</div>`;
  } else if(mode === 'error'){
    els.results.innerHTML = `<div class="state error"><div class="icon">⚠️</div>${msg}</div>`;
  } else if(mode === 'empty'){
    els.results.innerHTML = `<div class="state"><div class="icon">🔍</div>${msg || 'Δεν βρέθηκαν αποτελέσματα.'}</div>`;
  }
}

function filterLanguages(results){
  if(els.showIndianKorean.checked) return results;
  return results.filter(r => !HIDDEN_LANGS.includes(r.original_language));
}

async function fetchPage(page){
  const q = els.query.value.trim();
  let data;
  if(q){
    data = await tmdbFetch(`/search/${state.mediaType}`, { query: q, page, language: 'en-US' });
  } else {
    const params = {
      sort_by: els.sortBy.value,
      page,
      'vote_count.gte': 20,
      language: 'en-US',
    };
    if(state.selectedGenres.size) params.with_genres = Array.from(state.selectedGenres).join(',');
    const dateField = state.mediaType === 'movie' ? 'primary_release_date' : 'first_air_date';
    if(els.dateFrom.value) params[`${dateField}.gte`] = `${els.dateFrom.value}-01-01`;
    if(els.dateTo.value) params[`${dateField}.lte`] = `${els.dateTo.value}-12-31`;
    if(parseFloat(els.minRating.value) > 0) params['vote_average.gte'] = els.minRating.value;
    data = await tmdbFetch(`/discover/${state.mediaType}`, params);
  }

  let results = data.results || [];
  if(q){
    if(state.selectedGenres.size){
      results = results.filter(r => (r.genre_ids||[]).some(g => state.selectedGenres.has(String(g))));
    }
    if(parseFloat(els.minRating.value) > 0){
      results = results.filter(r => (r.vote_average||0) >= parseFloat(els.minRating.value));
    }
    const yFrom = els.dateFrom.value ? parseInt(els.dateFrom.value) : null;
    const yTo = els.dateTo.value ? parseInt(els.dateTo.value) : null;
    if(yFrom || yTo){
      results = results.filter(r => {
        const d = r.release_date || r.first_air_date || '';
        if(!d) return false;
        const y = parseInt(d.slice(0,4));
        if(yFrom && y < yFrom) return false;
        if(yTo && y > yTo) return false;
        return true;
      });
    }
  }
  results = filterLanguages(results);
  return { results, totalPages: data.total_pages || 1 };
}

async function runSearch(){
  els.goBtn.disabled = true;
  setState('loading');
  els.resultCount.textContent = '';
  els.loadMoreRow.style.display = 'none';
  state.currentPage = 1;

  try{
    const { results, totalPages } = await fetchPage(1);
    state.totalPages = totalPages;
    state.lastResults = results;

    if(!results.length){
      setState('empty', 'Δεν βρέθηκαν αποτελέσματα με αυτά τα φίλτρα. Δοκίμασε να χαλαρώσεις κάποιο φίλτρο.');
      return;
    }

    els.results.innerHTML = '';
    els.resultCount.textContent = `${results.length} αποτελέσματα (σελίδα 1 από ${totalPages})`;
    renderResultsSkeleton(results);
    enrichWithImdb(results);

    if(state.currentPage < state.totalPages){
      els.loadMoreRow.style.display = 'flex';
    }
  }catch(e){
    setState('error', 'Κάτι πήγε στραβά με το αίτημα. Δοκίμασε ξανά σε λίγο.');
  } finally {
    els.goBtn.disabled = false;
  }
}

async function loadMore(){
  els.loadMoreBtn.disabled = true;
  els.loadMoreBtn.textContent = 'Φόρτωση...';
  try{
    state.currentPage += 1;
    const { results } = await fetchPage(state.currentPage);
    state.lastResults = state.lastResults.concat(results);
    renderResultsSkeleton(results, true);
    enrichWithImdb(results);
    els.resultCount.textContent = `${state.lastResults.length} αποτελέσματα (σελίδα ${state.currentPage} από ${state.totalPages})`;
    if(state.currentPage >= state.totalPages){
      els.loadMoreRow.style.display = 'none';
    }
  }catch(e){
    // αν αποτύχει, απλά άσε το κουμπί ενεργό για νέα προσπάθεια
  } finally {
    els.loadMoreBtn.disabled = false;
    els.loadMoreBtn.textContent = 'Φόρτωση περισσότερων';
  }
}

els.goBtn.addEventListener('click', runSearch);
els.loadMoreBtn.addEventListener('click', loadMore);

applyViewMode();
setState('empty', 'Επίλεξε φίλτρα και πάτα Αναζήτηση για να ξεκινήσεις.');
loadGenres();
</script>
