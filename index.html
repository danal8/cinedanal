<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineDanal — Αναζήτηση Ταινιών &amp; Σειρών</title>
<meta name="theme-color" content="#0b0d10">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230b0d10'/%3E%3Ctext x='50' y='70' font-family='Georgia, serif' font-size='58' font-weight='700' font-style='italic' fill='%23e8b34a' text-anchor='middle'%3ECD%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230b0d10'/%3E%3Ctext x='50' y='70' font-family='Georgia, serif' font-size='58' font-weight='700' font-style='italic' fill='%23e8b34a' text-anchor='middle'%3ECD%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0d10;
    --bg-raised:#15181d;
    --card:#1b1f26;
    --line:#2a2f38;
    --gold:#e8b34a;
    --gold-dim:#a67f2f;
    --teal:#5a9aa1;
    --text:#f2ede1;
    --text-dim:#9aa0ab;
    --danger:#c96a5a;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(232,179,74,0.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:32px 20px 80px;}

  header{
    display:flex;flex-direction:column;gap:6px;margin-bottom:28px;
    border-bottom:1px solid var(--line);padding-bottom:22px;
  }
  .brand{display:flex;align-items:baseline;gap:12px;}
  .brand .reel{font-family:'IBM Plex Mono';font-size:12px;letter-spacing:3px;color:var(--gold-dim);text-transform:uppercase;}
  h1{
    font-family:'Fraunces', serif;font-weight:700;font-size:40px;margin:0;
    letter-spacing:-0.5px;
  }
  h1 span{color:var(--gold);font-style:italic;font-weight:600;}
  .tagline{color:var(--text-dim);font-size:14px;margin:0;}

  .keys{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;
  }
  .keys input{
    background:var(--bg-raised);border:1px solid var(--line);color:var(--text);
    padding:10px 12px;border-radius:8px;font-family:'IBM Plex Mono';font-size:12px;
  }
  .keys label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px;}
  .keys .field{display:flex;flex-direction:column;}
  .keyshelp{font-size:12px;color:var(--text-dim);margin-top:8px;line-height:1.5;}
  .keyshelp a{color:var(--teal);}

  .controls{
    display:flex;flex-wrap:wrap;gap:12px;align-items:end;margin:26px 0 8px;
    background:var(--bg-raised);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px;
  }
  .field label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;}
  .field input[type=text], .field select, .field input[type=number]{
    background:#0f1216;border:1px solid var(--line);color:var(--text);
    padding:9px 10px;border-radius:7px;font-family:'IBM Plex Sans';font-size:13.5px;min-width:130px;
  }
  .field input[type=number]{min-width:100px;}
  .keystatus{font-size:11.5px;color:var(--teal);margin-top:6px;min-height:16px;}
  .field input[type=text]{min-width:220px;}
  .field.grow{flex:1;}
  .field-note{display:block;font-size:10.5px;color:var(--text-dim);margin-top:4px;max-width:150px;}
  select:disabled{opacity:.4;cursor:not-allowed;}
  .genre-chips{display:flex;flex-wrap:wrap;gap:6px;max-width:420px;}
  .genre-filter-btn{
    background:var(--bg-raised);border:1px solid var(--line);color:var(--text);
    padding:9px 14px;border-radius:7px;font-size:13px;cursor:pointer;font-family:'IBM Plex Sans';
  }
  .genre-filter-btn:hover{border-color:var(--gold-dim);}
  #genreFilterCount{color:var(--gold);font-family:'IBM Plex Mono';}
  .genre-chips-panel{
    position:absolute;top:calc(100% + 6px);left:0;z-index:20;background:var(--bg-raised);
    border:1px solid var(--line);border-radius:10px;padding:14px;max-width:460px;
    box-shadow:0 12px 30px rgba(0,0,0,0.4);
  }
  .genre-chips-panel.hidden{display:none;}
  .chip{
    border:1px solid var(--line);padding:6px 12px;border-radius:999px;font-size:12.5px;
    cursor:pointer;color:var(--text-dim);user-select:none;transition:all .15s;
  }
  .chip:hover{border-color:var(--gold-dim);color:var(--text);}
  .chip.active{background:var(--gold);border-color:var(--gold);color:#1a1200;font-weight:600;}
  .range-row{display:flex;align-items:center;gap:8px;}
  .range-row input[type=range]{accent-color:var(--gold);width:130px;}
  .range-val{font-family:'IBM Plex Mono';font-size:12.5px;color:var(--gold);min-width:28px;}
  button.go{
    background:var(--gold);color:#1a1200;border:none;padding:10px 22px;border-radius:7px;
    font-weight:600;cursor:pointer;font-size:13.5px;letter-spacing:.3px;
  }
  button.go:hover{background:#f0c165;}
  button.go:disabled{opacity:.5;cursor:default;}
  button.clear{
    background:transparent;border:1px solid var(--line);color:var(--text-dim);padding:10px 18px;
    border-radius:7px;cursor:pointer;font-size:13.5px;font-family:'IBM Plex Sans';
  }
  button.clear:hover{border-color:var(--danger);color:var(--danger);}

  .meta-row{display:flex;justify-content:space-between;align-items:center;margin:22px 0 14px;}
  .meta-row .count{color:var(--text-dim);font-size:13px;font-family:'IBM Plex Mono';}
  .sortfield select{background:var(--bg-raised);border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:7px;font-size:12.5px;}

  .view-toggle{display:flex;gap:4px;background:var(--bg-raised);border:1px solid var(--line);border-radius:7px;padding:3px;}
  .view-toggle button{
    background:transparent;border:none;color:var(--text-dim);padding:6px 12px;border-radius:5px;
    cursor:pointer;font-size:12.5px;font-family:'IBM Plex Sans';
  }
  .view-toggle button.active{background:var(--gold);color:#1a1200;font-weight:600;}

  .toggle-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-dim);}
  .toggle-row input{accent-color:var(--gold);width:15px;height:15px;cursor:pointer;flex-shrink:0;}
  .toggle-row label{cursor:pointer;}
  .panel-toggle{border-top:1px solid var(--line);margin-top:12px;padding-top:12px;max-width:280px;}

  .grid{
    display:grid;grid-template-columns:repeat(auto-fill, minmax(190px, 1fr));gap:20px;
  }
  .grid.list-mode{
    display:flex;flex-direction:column;gap:8px;
  }
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
    display:flex;flex-direction:column;transition:transform .18s, border-color .18s;cursor:pointer;
  }
  .card:hover{transform:translateY(-3px);border-color:var(--gold-dim);}
  .rank{display:none;}
  .stremio-btn{
    display:none;align-items:center;justify-content:center;width:30px;height:30px;flex:0 0 30px;
    background:rgba(90,154,161,0.15);border:1px solid rgba(90,154,161,0.4);border-radius:50%;
    color:var(--teal);text-decoration:none;font-size:12px;margin-left:8px;
  }
  .stremio-btn:hover{background:rgba(90,154,161,0.3);}
  .list-mode .stremio-btn{display:flex;}

  .list-mode .card{
    flex-direction:row;align-items:center;transform:none !important;
    padding:8px 16px 8px 8px;gap:14px;
  }
  .list-mode .card:hover{transform:none !important;border-color:var(--gold-dim);}
  .list-mode .rank{
    display:flex;align-items:center;justify-content:center;flex:0 0 34px;
    font-family:'IBM Plex Mono';font-weight:600;color:var(--text-dim);font-size:14px;
  }
  .list-mode .poster-wrap{width:50px;flex:0 0 50px;aspect-ratio:2/3;border-radius:6px;overflow:hidden;}
  .list-mode .badges{display:none;}
  .list-mode .card-body{
    flex-direction:row;align-items:center;padding:0;flex:1;gap:0;min-width:0;
  }
  .list-mode .card-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
  .list-mode .card-title{
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:15px;
  }
  .list-mode .card-sub{
    display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--text-dim);
  }
  .list-mode .card-type{margin-top:0;}
  .list-mode .rating-box{
    flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:2px;margin-left:14px;
  }
  .list-mode .rating-line{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono';font-size:13px;white-space:nowrap;}
  .list-mode .rating-line .star{color:var(--gold);}
  .list-mode .rating-line.imdb-line{color:var(--gold);font-weight:600;}
  .list-mode .rating-line.meta-line{color:#6cb35a;font-size:11.5px;min-height:14px;}
  .list-mode .rating-line.tmdb-line{color:var(--text-dim);font-size:10.5px;opacity:.75;}

  .poster-wrap{position:relative;aspect-ratio:2/3;background:#0f1216;}
  .poster-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
  .poster-wrap .noimg{
    display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);
    font-family:'Fraunces';font-style:italic;font-size:13px;text-align:center;padding:10px;
  }
  .badges{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;gap:6px;}
  .badge{
    font-family:'IBM Plex Mono';font-size:11px;font-weight:600;padding:3px 7px;border-radius:5px;
    backdrop-filter:blur(4px);display:flex;align-items:center;gap:4px;
  }
  .badge.imdb{background:rgba(232,179,74,0.92);color:#1a1200;}
  .badge.tmdb{background:rgba(255,255,255,0.1);color:var(--text-dim);}
  .badge.pending{background:rgba(255,255,255,0.12);color:var(--text-dim);}
  .badge.age{background:rgba(90,154,161,0.2);color:var(--teal);border:1px solid rgba(90,154,161,0.4);}
  .badge.meta{background:rgba(108,179,90,0.2);color:#6cb35a;border:1px solid rgba(108,179,90,0.4);}
  .badge.meta:empty{display:none;}
  .rating-box{display:none;}
  .card-body{padding:12px 13px 14px;display:flex;flex-direction:column;gap:5px;flex:1;}
  .card-title{font-family:'Fraunces';font-weight:600;font-size:15.5px;line-height:1.25;}
  .card-sub{font-size:12px;color:var(--text-dim);font-family:'IBM Plex Mono';}
  .card-type{
    align-self:flex-start;font-size:10px;text-transform:uppercase;letter-spacing:1px;
    color:var(--teal);border:1px solid rgba(90,154,161,0.4);padding:2px 6px;border-radius:4px;margin-top:2px;
  }

  .state{padding:60px 20px;text-align:center;color:var(--text-dim);}
  .state .icon{font-size:32px;margin-bottom:10px;}
  .state.error{color:var(--danger);}

  .load-more-row{display:flex;justify-content:center;margin-top:28px;}
  button.loadmore{
    background:transparent;border:1px solid var(--gold-dim);color:var(--gold);padding:10px 26px;border-radius:7px;
    font-weight:600;cursor:pointer;font-size:13px;letter-spacing:.3px;
  }
  button.loadmore:hover{background:rgba(232,179,74,0.1);}
  button.loadmore:disabled{opacity:.5;cursor:default;}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(5,6,8,0.82);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal-overlay.hidden{display:none;}
  .modal{
    background:var(--card);border:1px solid var(--line);border-radius:14px;max-width:640px;width:100%;
    max-height:86vh;overflow-y:auto;position:relative;
  }
  .modal-close{
    position:absolute;top:12px;right:14px;background:rgba(0,0,0,0.4);border:none;color:var(--text);
    width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;z-index:2;
  }
  .modal-hero{display:flex;gap:18px;padding:22px;border-bottom:1px solid var(--line);}
  .modal-hero img{width:120px;border-radius:8px;flex:0 0 120px;}
  .modal-hero .noimg{width:120px;height:180px;flex:0 0 120px;background:#0f1216;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-family:'Fraunces';font-style:italic;font-size:12px;text-align:center;padding:6px;}
  .modal-title{font-family:'Fraunces';font-weight:700;font-size:22px;margin:0 0 4px;}
  .modal-greek-title{font-size:12px;color:var(--text-dim);margin-bottom:8px;font-style:italic;}
  .modal-meta{font-family:'IBM Plex Mono';font-size:12px;color:var(--text-dim);margin-bottom:10px;}
  .modal-badges{display:flex;gap:8px;margin-bottom:10px;}
  .modal-genres{font-size:12px;color:var(--teal);}
  .modal-providers{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .providers-label{font-size:10.5px;color:var(--text-dim);margin-right:2px;}
  .provider-logo{width:28px;height:28px;border-radius:6px;}
  .modal-body{padding:20px 22px;}
  .modal-overview{font-size:14px;line-height:1.6;color:var(--text);}
  .modal-loading{padding:40px;text-align:center;color:var(--text-dim);}
  .modal-recs-title{
    font-family:'Fraunces';font-weight:600;font-size:15px;margin:22px 0 10px;color:var(--text);
  }
  .modal-recs-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;}
  .rec-card{flex:0 0 92px;cursor:pointer;}
  .rec-card img{width:92px;height:138px;object-fit:cover;border-radius:6px;display:block;}
  .rec-noimg{
    width:92px;height:138px;background:#0f1216;border-radius:6px;display:flex;align-items:center;
    justify-content:center;text-align:center;font-size:10.5px;color:var(--text-dim);padding:4px;
    font-family:'Fraunces';font-style:italic;
  }
  .rec-title{font-size:11px;color:var(--text-dim);margin-top:5px;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .rec-card:hover .rec-title{color:var(--gold);}
  .season-select{
    background:var(--bg-raised);border:1px solid var(--line);color:var(--text);
    padding:8px 10px;border-radius:7px;font-size:13px;margin-bottom:10px;
  }
  .episodes-list{display:flex;flex-direction:column;gap:1px;margin-bottom:20px;max-height:280px;overflow-y:auto;}
  .episode-row{
    display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg-raised);
    border-radius:6px;font-size:12.5px;
  }
  .episode-num{font-family:'IBM Plex Mono';color:var(--text-dim);flex:0 0 30px;}
  .episode-title{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .episode-rating{font-family:'IBM Plex Mono';color:var(--teal);flex:0 0 auto;}
  .trailer-link{
    display:inline-flex;align-items:center;gap:6px;background:var(--gold);color:#1a1200;
    padding:9px 18px;border-radius:7px;font-weight:600;font-size:13px;text-decoration:none;
    margin-bottom:16px;margin-right:8px;
  }
  .trailer-link:hover{background:#f0c165;}
  .modal-share-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .share-chip{
    display:inline-flex;align-items:center;gap:6px;background:var(--bg-raised);border:1px solid var(--line);
    color:var(--text);padding:9px 16px;border-radius:7px;font-size:13px;text-decoration:none;
    font-family:'IBM Plex Sans';
  }
  .share-chip:hover{border-color:var(--gold-dim);}
  .share-chip.whatsapp:hover{border-color:#25D366;color:#25D366;}
  .share-chip.viber:hover{border-color:#7360F2;color:#7360F2;}

  footer{margin-top:50px;color:var(--text-dim);font-size:11.5px;text-align:center;font-family:'IBM Plex Mono';}

  .filters-toggle-btn{
    display:none;
    background:var(--bg-raised);border:1px solid var(--line);color:var(--text);
    padding:9px 12px;border-radius:7px;font-size:13px;cursor:pointer;font-family:'IBM Plex Sans';
    align-items:center;gap:4px;
  }
  #advancedFilters{display:contents;}

  @media (max-width: 640px){
    .wrap{padding:14px 12px 50px;}
    .brand .reel{font-size:8px;letter-spacing:1.5px;}
    h1{font-size:20px;}
    .tagline{font-size:11.5px;}
    header{margin-bottom:14px;padding-bottom:10px;}
    .controls{padding:12px;gap:8px 6px;}
    .field input[type=text]{min-width:0;width:100%;}
    .field.grow{flex:1 1 100%;}
    .field{flex:1 1 auto;}

    .filters-toggle-btn{display:inline-flex;flex:1 1 30%;justify-content:center;min-width:0;}

    .controls > .field:nth-child(2),
    .controls > .field:nth-child(5){
      flex:1 1 30%;
      min-width:0;
    }
    .controls > .field:nth-child(2) select,
    .controls > .field:nth-child(5) select{
      min-width:0;width:100%;padding:8px 6px;font-size:12px;
    }

    #advancedFilters.open{
      display:flex;flex-wrap:wrap;gap:8px 6px;width:100%;
      background:var(--bg-raised);border:1px solid var(--line);border-radius:8px;padding:10px;margin-top:2px;
    }
    #advancedFilters .field{flex:1 1 45%;min-width:0;}
    #advancedFilters .field input,
    #advancedFilters .field select{min-width:0;width:100%;padding:8px 6px;font-size:12px;}

    .controls .field label{font-size:9.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .controls .range-row{gap:4px;}
    .controls .range-row input[type=range]{width:100%;min-width:0;}
    .controls .range-val{font-size:11px;min-width:22px;}
    button.go, button.clear{padding:10px 16px;font-size:13px;}
    .list-mode .card-title{font-size:13.5px;}
    .rank{flex:0 0 22px !important;font-size:11px;}
    .list-mode .poster-wrap{width:38px;flex:0 0 38px;}
    .list-mode .rating-box{margin-left:4px;}
    .list-mode .rating-line{font-size:10.5px;}
    .stremio-btn{width:26px;height:26px;flex:0 0 26px;margin-left:4px;}
    .modal-hero{flex-direction:column;}
    .modal-hero img, .modal-hero .noimg{width:100%;flex:none;height:auto;aspect-ratio:2/3;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <span class="reel">● REC</span>
      <h1>Cine<span>Danal</span></h1>
    </div>
    <p class="tagline">Αναζήτηση ταινιών &amp; σειρών με φίλτρα είδους, χρονιάς και βαθμολογίας IMDb.</p>
  </header>

  <div class="controls">
    <div class="field grow">
      <label for="query">Αναζήτηση τίτλου (προαιρετικό)</label>
      <input type="text" id="query" placeholder="π.χ. Dune, Breaking Bad...">
    </div>
    <div class="field">
      <label for="mediaType">Τύπος</label>
      <select id="mediaType">
        <option value="movie">Ταινίες</option>
        <option value="tv">Σειρές</option>
      </select>
    </div>
    <button type="button" id="filtersToggleBtn" class="filters-toggle-btn">⚙ Φίλτρα</button>
    <div class="advanced-filters" id="advancedFilters">
      <div class="field">
        <label for="yearFrom">Από έτος</label>
        <input type="number" id="yearFrom" placeholder="π.χ. 2015" min="1900" max="2030">
      </div>
      <div class="field">
        <label for="yearTo">Έως έτος</label>
        <input type="number" id="yearTo" placeholder="π.χ. 2026" min="1900" max="2030">
      </div>
      <div class="field">
        <label>Ελάχιστο IMDb rating</label>
        <div class="range-row">
          <input type="range" id="minRating" min="0" max="10" step="0.5" value="0">
          <span class="range-val" id="minRatingVal">0.0</span>
        </div>
      </div>
      <div class="field" id="ageLimitField">
        <label for="ageLimit">Ηλικιακό όριο</label>
        <select id="ageLimit">
          <option value="">Χωρίς όριο</option>
          <option value="12A">Έως 12 ετών</option>
          <option value="15">Έως 16 ετών</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Ταξινόμηση</label>
      <select id="sortBy">
        <option value="trending" selected>Trending τώρα</option>

<script>
const TMDB_API_KEY = '4239ea4fdcba7a007d399f16f3e31207';

function applyViewMode(){

    els.results.classList.add('list-mode');

    els.viewGridBtn.classList.remove('active');

    els.viewGridBtn.classList.add('active');
    els.viewListBtn.classList.remove('active');

}
els.viewListBtn.addEventListener('click', () => { state.viewMode = 'list'; applyViewMode(); });
els.viewGridBtn.addEventListener('click', () => { state.viewMode = 'grid'; applyViewMode(); });
els.genreFilterBtn.addEventListener('click', (e) => {

});
function updateGenreFilterCount(){
  els.genreFilterCount.textContent = state.selectedGenres.size ? `(${state.selectedGenres.size})` : '';
}

});

});

els.mediaType.addEventListener('change', async () => {

});

function updateAgeLimitAvailability(){
  const isMovie = state.mediaType === 'movie';
  els.ageLimit.disabled = !isMovie;
  if(!isMovie) els.ageLimit.value = '';
}
updateAgeLimitAvailability();

const AGE_ORDER = { 'U':0, 'PG':1, '12A':2, '12':2, '15':3, '16':3, '18':4 };
async function getMovieCertification(tmdbId){
  try{
    const data = await tmdbFetch(`/movie/${tmdbId}/release_dates`);
    const gb = (data.results || []).find(r => r.country_code === 'GB');
    if(!gb || !gb.release_dates.length) return null;
    const withCert = gb.release_dates.find(rd => rd.certification);
    return withCert ? withCert.certification : null;
  }catch(e){
    return null;
  }
}

async function tmdbFetch(path, params={}){
  const url = new URL(`https://api.themoviedb.org/3${path}`);
  url.searchParams.set('api_key', TMDB_API_KEY);
  url.searchParams.set('language', params.language || 'el-GR');
  for(const [k,v] of Object.entries(params)){
    if(k === 'language') continue;
    if(v !== '' && v !== undefined && v !== null) url.searchParams.set(k, v);
  }
  const res = await fetch(url);
  if(!res.ok) throw new Error('TMDB_ERROR_' + res.status);
  return res.json();
}

async function loadGenres(){
  els.genreChips.innerHTML = '<span style="color:var(--text-dim);font-size:12px;">Φόρτωση ειδών...</span>';
  try{
    const data = await tmdbFetch(`/genre/${state.mediaType}/list`);
    state.genres = {};
    data.genres.forEach(g => state.genres[g.id] = g.name);
    renderGenreChips();
  }catch(e){
    els.genreChips.innerHTML = '<span style="color:var(--text-dim);font-size:12px;">Δεν φορτώθηκαν τα είδη — δοκίμασε ανανέωση σελίδας.</span>';
  }
}

function renderGenreChips(){
  els.genreChips.innerHTML = '';
  Object.entries(state.genres).forEach(([id, name]) => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (state.selectedGenres.has(id) ? ' active' : '');
    chip.textContent = name;
    chip.onclick = () => {
      if(state.selectedGenres.has(id)) state.selectedGenres.delete(id);
      else state.selectedGenres.add(id);
      renderGenreChips();
      updateGenreFilterCount();
    };
    els.genreChips.appendChild(chip);
  });
}

function posterUrl(path){
  return path ? `https://image.tmdb.org/t/p/w342${path}` : null;
}

function renderResultsSkeleton(items, append=false){
  if(!append) { els.results.innerHTML = ''; state.rankCounter = (state.currentPage - 1) * 20; }
  items.forEach(item => {
    state.rankCounter = (state.rankCounter || 0) + 1;
    const rank = state.rankCounter;
    const title = item.title || item.name || 'Άγνωστος τίτλος';
    const date = item.release_date || item.first_air_date || '';
    const year = date ? date.slice(0,4) : '—';
    const poster = posterUrl(item.poster_path);
    const voteCount = item.vote_count ? formatVoteCount(item.vote_count) : '';

    const hasPreloadedRatings = item._imdbRating !== undefined;
    const imdbText = hasPreloadedRatings ? (item._imdbRating ? `IMDb ${item._imdbRating}` : 'IMDb —') : 'IMDb …';
    const metaText = hasPreloadedRatings && item._metascore ? `Metascore ${item._metascore}` : '';

    const card = document.createElement('div');
    card.className = 'card';
    const stremioUrl = `stremio:///search?search=${encodeURIComponent(title)}`;
    card.innerHTML = `
      <div class="rank">#${rank}</div>
      <div class="poster-wrap">
        ${poster ? `<img src="${poster}" alt="${title}" loading="lazy">` : `<div class="noimg">Χωρίς αφίσα<br>${title}</div>`}
        <div class="badges">
          <span class="badge tmdb" title="Βαθμολογία TMDb">★ ${item.vote_average ? item.vote_average.toFixed(1) : '—'}</span>
          <span class="badge ${hasPreloadedRatings && item._imdbRating ? 'imdb' : 'pending'}" data-imdb-slot="${item.id}">${imdbText}</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-main">
          <div class="card-title">${title}</div>
          <div class="card-sub">
            <span>${year}</span>
            <span class="card-type">${state.mediaType === 'movie' ? 'Ταινία' : 'Σειρά'}</span>
          </div>
        </div>
        <a href="${stremioUrl}" class="stremio-btn" title="Άνοιγμα στο Stremio" onclick="event.stopPropagation()">▶</a>
        <div class="rating-box">
          <div class="rating-line imdb-line" data-imdb-line="${item.id}"><span class="star">★</span> ${imdbText}</div>
          <div class="rating-line meta-line" data-meta-slot="${item.id}">${metaText}</div>
          <div class="rating-line tmdb-line">TMDb ${item.vote_average ? item.vote_average.toFixed(1) : '—'}${voteCount ? ` · ${voteCount}` : ''}</div>
        </div>
      </div>
    `;
    card.addEventListener('click', () => openModal(item.id, title));
    els.results.appendChild(card);
  });
}

function formatVoteCount(n){
  if(n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if(n >= 1000) return (n/1000).toFixed(0) + 'K';
  return String(n);
}

async function fetchRatingsByTitleYear(title, year){
  try{
    const url = `https://www.omdbapi.com/?t=${encodeURIComponent(title)}${year ? `&y=${year}` : ''}&apikey=${OMDB_API_KEY}`;
    const res = await fetch(url);
    const d = await res.json();
    if(d.Response === 'False'){
      if(d.Error && /limit/i.test(d.Error)) state.omdbLimitReached = true;
      return { imdbRating: null, metascore: null };
    }
    return {
      imdbRating: d.imdbRating && d.imdbRating !== 'N/A' ? d.imdbRating : null,
      metascore: d.Metascore && d.Metascore !== 'N/A' ? d.Metascore : null,
    };
  }catch(e){
    return { imdbRating: null, metascore: null };
  }
}

async function fetchRatings(tmdbId){
  try{
    const extUrl = `https://api.themoviedb.org/3/${state.mediaType}/${tmdbId}/external_ids?api_key=${TMDB_API_KEY}`;
    const extRes = await fetch(extUrl);
    const ext = await extRes.json();
    const imdbId = ext.imdb_id;
    if(!imdbId) return { imdbRating: null, metascore: null };
    const omdbRes = await fetch(`https://www.omdbapi.com/?i=${imdbId}&apikey=${OMDB_API_KEY}`);
    const omdbData = await omdbRes.json();
    return {
      imdbRating: omdbData.imdbRating && omdbData.imdbRating !== 'N/A' ? omdbData.imdbRating : null,
      metascore: omdbData.Metascore && omdbData.Metascore !== 'N/A' ? omdbData.Metascore : null,
    };
  }catch(e){
    return { imdbRating: null, metascore: null };
  }
}

async function enrichWithImdb(items){
  for(const item of items){
    if(item._imdbRating !== undefined) continue; // ήδη φορτωμένο (ταξινόμηση IMDb/Metascore)
    const t = item.title || item.name || '';
    const y = (item.release_date || item.first_air_date || '').slice(0,4);
    fetchRatingsByTitleYear(t, y).then(({ imdbRating, metascore }) => {
      const slot = document.querySelector(`[data-imdb-slot="${item.id}"]`);
      const line = document.querySelector(`[data-imdb-line="${item.id}"]`);
      const metaSlot = document.querySelector(`[data-meta-slot="${item.id}"]`);
      const text = imdbRating ? `IMDb ${imdbRating}` : 'IMDb —';
      if(slot){
        slot.textContent = text;
        if(imdbRating){ slot.classList.remove('pending'); slot.classList.add('imdb'); }
      }
      if(line){
        line.innerHTML = `<span class="star">★</span> ${text}`;
      }
      if(metaSlot){
        metaSlot.textContent = metascore ? `Metascore ${metascore}` : '';
      }
    });
  }
}

async function openModal(tmdbId, englishTitle){
  els.modalOverlay.classList.remove('hidden');
  if(!(history.state && history.state.cinedanalModal)){
    history.pushState({ cinedanalModal: true }, '');
  }
  els.modalContent.innerHTML = '<div class="modal-loading">Φόρτωση...</div>';

    const details = await tmdbFetch(`/${state.mediaType}/${tmdbId}`, { append_to_response: 'external_ids' });
    const greekTitle = details.title || details.name;
    const title = englishTitle || greekTitle;
    const date = details.release_date || details.first_air_date || '';
    const year = date ? date.slice(0,4) : '—';
    const poster = posterUrl(details.poster_path);
    const genres = (details.genres || []).map(g => g.name).join(' · ');

    const videosData = await tmdbFetch(`/${state.mediaType}/${tmdbId}/videos`, { language: 'en-US' }).catch(() => ({ results: [] }));
    const videos = videosData.results || [];
    const recsData = await tmdbFetch(`/${state.mediaType}/${tmdbId}/recommendations`, { language: 'en-US' }).catch(() => ({ results: [] }));
    const recs = filterLanguages((recsData.results || [])).slice(0, 6);
    const providersData = await tmdbFetch(`/${state.mediaType}/${tmdbId}/watch/providers`).catch(() => ({ results: {} }));
    const grProviders = (providersData.results && providersData.results.GR) || null;
    const streamProviders = grProviders ? (grProviders.flatrate || grProviders.ads || []) : [];
    const trailer = videos.find(v => v.site === 'YouTube' && v.type === 'Trailer')

    const trailerUrl = trailer ? `https://www.youtube.com/watch?v=${trailer.key}` : null;
    const imdbUrl = imdbId ? `https://www.imdb.com/title/${imdbId}/` : null;
    const shareText = `${title} (${year})${imdbUrl ? ' — ' + imdbUrl : ''}`;

      <div class="modal-hero">
        ${poster ? `<img src="${poster}" alt="${title}">` : `<div class="noimg">Χωρίς αφίσα</div>`}
        <div>
          <div class="modal-title">${title}</div>
          ${showGreekTitle ? `<div class="modal-greek-title">Ελληνικός τίτλος: ${greekTitle}</div>` : ''}
          <div class="modal-meta">${year} · ${runtime}</div>
          <div class="modal-badges">
            <span class="badge pending" id="modalImdbBadge">IMDb…</span>
            <span class="badge meta" id="modalMetaBadge"></span>
            <span class="badge tmdb">TMDb ${details.vote_average ? details.vote_average.toFixed(1) : '—'}</span>
            ${certification ? `<span class="badge age">${certification}</span>` : ''}
          </div>
          <div class="modal-genres">${genres || ''}</div>
          ${streamProviders.length ? `
            <div class="modal-providers">
              <span class="providers-label">Διαθέσιμο σε (GR):</span>
              ${streamProviders.map(p => `<img src="https://image.tmdb.org/t/p/w45${p.logo_path}" alt="${p.provider_name}" title="${p.provider_name}" class="provider-logo">`).join('')}
            </div>
          ` : ''}
        </div>
      </div>
      <div class="modal-body">
        ${trailerUrl ? `<a href="${trailerUrl}" target="_blank" rel="noopener" class="trailer-link">▶ Trailer στο YouTube</a>` : ''}
        <div class="modal-share-row">

          <div class="modal-recs-title">Επεισόδια</div>
          <select id="seasonSelect" class="season-select">
            ${details.seasons.filter(s => s.season_number > 0).map(s => `<option value="${s.season_number}">${s.name || 'Σεζόν ' + s.season_number}</option>`).join('')}
          </select>
          <div id="episodesList" class="episodes-list"><div class="modal-loading">Φόρτωση επεισοδίων...</div></div>
        ` : ''}
        ${recs.length ? `
          <div class="modal-recs-title">Παρόμοιοι τίτλοι</div>

function closeModal(fromPopState){

}

window.addEventListener('popstate', (e) => {

function setState(mode, msg){
  if(mode === 'loading'){
    els.results.innerHTML = `<div class="state"><div class="icon">🎞️</div>${msg || 'Αναζήτηση...'}</div>`;
  } else if(mode === 'error'){
    els.results.innerHTML = `<div class="state error"><div class="icon">⚠️</div>${msg}</div>`;
  } else if(mode === 'empty'){
    els.results.innerHTML = `<div class="state"><div class="icon">🔍</div>${msg || 'Δεν βρέθηκαν αποτελέσματα.'}</div>`;
  }
}

function filterLanguages(results){
  if(els.showIndianKorean.checked) return results;
  return results.filter(r => !HIDDEN_LANGS.includes(r.original_language));
}

async function fetchRawPage(page, overrideSortBy){
  const q = els.query.value.trim();
  const sortMode = overrideSortBy || els.sortBy.value;
  const isRatingSort = sortMode === 'imdb_rating' || sortMode === 'metascore';
  const isTrending = sortMode === 'trending';
  const useClientFilters = !!q || isTrending;
  let data;
  if(q){
    data = await tmdbFetch(`/search/${state.mediaType}`, { query: q, page, language: 'en-US' });
  } else if(isTrending){
    data = await tmdbFetch(`/trending/${state.mediaType}/week`, { page, language: 'en-US' });
  } else {
    const params = {
      sort_by: isRatingSort ? 'vote_count.desc' : sortMode,
      page,
      'vote_count.gte': isRatingSort ? 100 : 20,
      language: 'en-US',
    };
    if(state.selectedGenres.size) params.with_genres = Array.from(state.selectedGenres).join(',');
    const dateField = state.mediaType === 'movie' ? 'primary_release_date' : 'first_air_date';
    if(els.dateFrom.value) params[`${dateField}.gte`] = `${els.dateFrom.value}-01-01`;
    if(els.dateTo.value) params[`${dateField}.lte`] = `${els.dateTo.value}-12-31`;
    if(state.mediaType === 'movie' && els.ageLimit.value){
      params.certification_country = 'GB';
      params['certification.lte'] = els.ageLimit.value;
    }
    data = await tmdbFetch(`/discover/${state.mediaType}`, params);
  }

  let results = data.results || [];
  if(useClientFilters){
    if(state.selectedGenres.size){
      results = results.filter(r => (r.genre_ids||[]).some(g => state.selectedGenres.has(String(g))));
    }
    const yFrom = els.dateFrom.value ? parseInt(els.dateFrom.value) : null;
    const yTo = els.dateTo.value ? parseInt(els.dateTo.value) : null;
    if(yFrom || yTo){
      results = results.filter(r => {
        const d = r.release_date || r.first_air_date || '';
        if(!d) return false;
        const y = parseInt(d.slice(0,4));
        if(yFrom && y < yFrom) return false;
        if(yTo && y > yTo) return false;
        return true;
      });
    }
  }
  results = filterLanguages(results);

  if(state.mediaType === 'movie' && els.ageLimit.value && useClientFilters){
    const threshold = AGE_ORDER[els.ageLimit.value];
    const certs = await Promise.all(results.map(r => getMovieCertification(r.id)));
    results = results.filter((r, i) => {
      const cert = certs[i];
      if(!cert) return false; // χωρίς γνωστή σήμανση, το αποκλείουμε για ασφάλεια
      const order = AGE_ORDER[cert];
      return order !== undefined && order <= threshold;
    });
  }

  return { results, totalPages: data.total_pages || 1 };
}

const RATING_POOL_PAGES = 5; // 100 πιο δημοφιλείς/γνωστοί τίτλοι — σταθερή δεξαμενή

async function fetchEnrichedPool(){
  const sortMode = els.sortBy.value;
  const isRatingSort = sortMode === 'imdb_rating' || sortMode === 'metascore';
  const key = sortMode === 'imdb_rating' ? '_imdbRating' : '_metascore';
  const minRating = parseFloat(els.minRating.value) || 0;
  const q = els.query.value.trim();
  const pagesToFetch = q ? [1, 2, 3] : Array.from({length: RATING_POOL_PAGES}, (_, i) => i + 1);

  // Για ταξινόμηση IMDb/Metascore θέλουμε σταθερή δεξαμενή γνωστών τίτλων (vote_count.desc).
  // Για όλες τις άλλες περιπτώσεις (π.χ. Trending + ελάχιστο rating) σεβόμαστε την επιλεγμένη ταξινόμηση.
  const poolSortOverride = isRatingSort ? 'vote_count.desc' : undefined;
  const pageResults = await Promise.all(pagesToFetch.map(p => fetchRawPage(p, poolSortOverride).catch(() => ({ results: [] }))));
  let pool = [];
  const seenIds = new Set();
  for(const pr of pageResults){
    for(const item of pr.results){
      if(!seenIds.has(item.id)){
        seenIds.add(item.id);
        pool.push(item);
      }
    }
  }

  const ratings = await Promise.all(pool.map(r => {
    const t = r.title || r.name || '';
    const y = (r.release_date || r.first_air_date || '').slice(0,4);
    return fetchRatingsByTitleYear(t, y);
  }));
  pool.forEach((r, i) => {
    r._imdbRating = ratings[i].imdbRating ? parseFloat(ratings[i].imdbRating) : null;
    r._metascore = ratings[i].metascore ? parseInt(ratings[i].metascore) : null;
  });

  if(minRating > 0){
    pool = pool.filter(r => r._imdbRating !== null && r._imdbRating >= minRating);
  }
  if(isRatingSort){
    pool = pool.filter(r => r[key] !== null).sort((a, b) => b[key] - a[key]);
  }
  return pool;
}

function isRatingSortMode(){
  return els.sortBy.value === 'imdb_rating' || els.sortBy.value === 'metascore';
}
function needsPool(){
  return isRatingSortMode() || parseFloat(els.minRating.value) > 0;
}

async function runSearch(){
  els.goBtn.disabled = true;
  setState('loading');
  els.resultCount.textContent = '';
  els.loadMoreRow.style.display = 'none';
  state.currentPage = 1;
  state.ratingPool = null;
  state.omdbLimitReached = false;

  try{
    let results, totalPages;
    if(needsPool()){
      const pool = await fetchEnrichedPool();
      state.ratingPool = pool;
      results = pool.slice(0, 20);
      totalPages = Math.max(1, Math.ceil(pool.length / 20));
    } else {
      ({ results, totalPages } = await fetchRawPage(1));
    }
    state.totalPages = totalPages;
    state.lastResults = results;

    if(!results.length){
      if(state.omdbLimitReached){
        setState('error', 'Το OMDb (πηγή για IMDb rating/Metascore) έχει φτάσει το ημερήσιο όριο των 1.000 αιτημάτων του δωρεάν πλάνου. Δοκίμασε ξανά αύριο, ή προσωρινά χρησιμοποίησε ταξινόμηση "Δημοφιλία" χωρίς ελάχιστο IMDb rating.');
      } else {
        setState('empty', 'Δεν βρέθηκαν αποτελέσματα με αυτά τα φίλτρα. Δοκίμασε να χαλαρώσεις κάποιο φίλτρο.');
      }
      return;
    }

    els.results.innerHTML = '';
    els.resultCount.textContent = `${results.length} αποτελέσματα (σελίδα 1 από ${totalPages})`;
    renderResultsSkeleton(results);
    enrichWithImdb(results);

    if(state.currentPage < state.totalPages){
      els.loadMoreRow.style.display = 'flex';
    }
  }catch(e){
    setState('error', 'Κάτι πήγε στραβά με το αίτημα. Δοκίμασε ξανά σε λίγο.');
  } finally {
    els.goBtn.disabled = false;
  }
}

async function loadMore(){
  els.loadMoreBtn.disabled = true;
  els.loadMoreBtn.textContent = 'Φόρτωση...';
  try{
    state.currentPage += 1;
    let results;
    if(needsPool() && state.ratingPool){
      const start = (state.currentPage - 1) * 20;
      results = state.ratingPool.slice(start, start + 20);
    } else {
      ({ results } = await fetchRawPage(state.currentPage));
    }
    state.lastResults = state.lastResults.concat(results);
    renderResultsSkeleton(results, true);
    enrichWithImdb(results);
    els.resultCount.textContent = `${state.lastResults.length} αποτελέσματα (σελίδα ${state.currentPage} από ${state.totalPages})`;
    if(state.currentPage >= state.totalPages){
      els.loadMoreRow.style.display = 'none';
    }
  }catch(e){
    // αν αποτύχει, απλά άσε το κουμπί ενεργό για νέα προσπάθεια
  } finally {
    els.loadMoreBtn.disabled = false;
    els.loadMoreBtn.textContent = 'Φόρτωση περισσότερων';
  }
}

function clearFilters(){
  els.query.value = '';
  els.mediaType.value = 'movie';
  state.mediaType = 'movie';
  els.dateFrom.value = '';
  els.dateTo.value = '';
  els.minRating.value = 0;
  els.minRatingVal.textContent = '0.0';
  els.sortBy.value = 'trending';
  els.ageLimit.value = '';
  updateAgeLimitAvailability();
  els.showIndianKorean.checked = false;
  state.selectedGenres.clear();
  renderGenreChips();
  updateGenreFilterCount();
  els.genreChipsPanel.classList.add('hidden');
  loadGenres();
  els.loadMoreRow.style.display = 'none';
  setState('empty', 'Επίλεξε φίλτρα και πάτα Αναζήτηση για να ξεκινήσεις.');
  els.resultCount.textContent = '';
}
els.clearBtn.addEventListener('click', clearFilters);

const filtersToggleBtn = document.getElementById('filtersToggleBtn');
const advancedFilters = document.getElementById('advancedFilters');
if(filtersToggleBtn && advancedFilters){
  filtersToggleBtn.addEventListener('click', () => {
    advancedFilters.classList.toggle('open');
  });
}

els.goBtn.addEventListener('click', runSearch);
els.loadMoreBtn.addEventListener('click', loadMore);

applyViewMode();
setState('empty', 'Επίλεξε φίλτρα και πάτα Αναζήτηση για να ξεκινήσεις.');
loadGenres();
</script>
