<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineDanal — Αναζήτηση Ταινιών &amp; Σειρών</title>
<meta name="theme-color" content="#0b0d10">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta property="og:title" content="CineDanal — Αναζήτηση Ταινιών &amp; Σειρών">
<meta property="og:description" content="Αναζήτηση ταινιών &amp; σειρών με φίλτρα είδους, χρονιάς και βαθμολογίας IMDb.">
<meta property="og:image" content="icon-512.png">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0d10;
    --bg-raised:#15181d;
    --card:#1b1f26;
    --line:#2a2f38;
    --gold:#e8b34a;
    --gold-dim:#a67f2f;
    --teal:#5a9aa1;
    --text:#f2ede1;
    --text-dim:#9aa0ab;
    --danger:#c96a5a;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(232,179,74,0.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:32px 20px 80px;}

  header{
    display:flex;flex-direction:column;gap:6px;margin-bottom:28px;
    border-bottom:1px solid var(--line);padding-bottom:22px;
  }
  .brand{display:flex;align-items:baseline;gap:12px;}
  .brand-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .profile-btn{
    background:var(--bg-raised);border:1px solid var(--line);color:var(--text);
    padding:8px 14px;border-radius:20px;font-size:12.5px;cursor:pointer;font-family:'IBM Plex Sans';
    white-space:nowrap;
  }
  .profile-btn:hover{border-color:var(--gold-dim);}
  .watchlist-toggle-btn{
    background:var(--bg-raised);border:1px solid var(--line);color:var(--text-dim);
    padding:0 14px;height:38px;border-radius:7px;font-size:12.5px;cursor:pointer;font-family:'IBM Plex Sans';
    white-space:nowrap;display:inline-flex;align-items:center;
  }
  .watchlist-toggle-btn.active{background:var(--gold);color:#1a1200;font-weight:600;border-color:var(--gold);}
  .watchlist-toggle-btn:hover:not(.active){border-color:var(--gold-dim);color:var(--text);}

  .auth-modal{max-width:400px;padding:28px;}
  .auth-title{font-family:'Fraunces';font-weight:700;font-size:20px;margin-bottom:16px;}
  .auth-section{margin-bottom:20px;}
  .auth-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:block;}
  .profile-pill-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
  .profile-pill{
    background:var(--bg-raised);border:1px solid var(--line);color:var(--text);padding:8px 16px;
    border-radius:20px;cursor:pointer;font-size:13px;
  }
  .profile-pill:hover{border-color:var(--gold-dim);}
  .auth-input{
    background:var(--bg-raised);border:1px solid var(--line);color:var(--text);padding:10px 12px;
    border-radius:7px;font-size:14px;width:100%;margin-bottom:10px;outline:none;
  }
  .auth-input:focus{border-color:var(--gold-dim);}
  .auth-btn{
    background:var(--gold);color:#1a1200;border:none;padding:10px 20px;border-radius:7px;
    font-weight:600;cursor:pointer;font-size:13.5px;width:100%;
  }
  .auth-btn:hover{background:#f0c165;}
  .auth-btn.secondary{background:transparent;border:1px solid var(--line);color:var(--text-dim);margin-top:8px;}
  .auth-error{color:var(--danger);font-size:12.5px;margin-top:6px;}
  .auth-divider{text-align:center;color:var(--text-dim);font-size:11px;margin:16px 0;text-transform:uppercase;letter-spacing:1px;}

  .bookmark-badge{
    position:absolute;top:6px;left:6px;width:24px;height:24px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:rgba(15,18,22,0.85);border:1.5px solid rgba(255,255,255,0.5);color:#fff;
    cursor:pointer;font-size:16px;line-height:1;font-weight:600;padding:0;z-index:2;
  }
  .bookmark-badge.saved{background:var(--gold);border-color:var(--gold);color:#1a1200;}
  .bookmark-badge:hover{border-color:var(--gold);}
  .list-mode .bookmark-badge{width:22px;height:22px;font-size:14px;top:4px;left:4px;}
  .brand .reel{font-family:'IBM Plex Mono';font-size:12px;letter-spacing:3px;color:var(--gold-dim);text-transform:uppercase;}
  h1{
    font-family:'Fraunces', serif;font-weight:700;font-size:40px;margin:0;
    letter-spacing:-0.5px;
  }
  h1 span{color:var(--gold);font-style:italic;font-weight:600;}
  .tagline{color:var(--text-dim);font-size:14px;margin:0;}

  .keys{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;
  }
  .keys input{
    background:var(--bg-raised);border:1px solid var(--line);color:var(--text);
    padding:10px 12px;border-radius:8px;font-family:'IBM Plex Mono';font-size:12px;
  }
  .keys label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px;}
  .keys .field{display:flex;flex-direction:column;}
  .keyshelp{font-size:12px;color:var(--text-dim);margin-top:8px;line-height:1.5;}
  .keyshelp a{color:var(--teal);}

  .controls{
    display:flex;flex-wrap:wrap;gap:12px;align-items:end;margin:26px 0 8px;
    background:var(--bg-raised);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px;
  }
  .field label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;}
  .field input[type=text], .field select, .field input[type=number]{
    background:#0f1216;border:1px solid var(--line);color:var(--text);
    padding:9px 10px;border-radius:7px;font-family:'IBM Plex Sans';font-size:13.5px;min-width:130px;
  }
  .field input[type=number]{min-width:100px;}
  .keystatus{font-size:11.5px;color:var(--teal);margin-top:6px;min-height:16px;}
  .field input[type=text]{min-width:220px;}
  .field.grow{flex:1;}
  .field-note{display:block;font-size:10.5px;color:var(--text-dim);margin-top:4px;max-width:150px;}
  select:disabled{opacity:.4;cursor:not-allowed;}
  .genre-chips{display:flex;flex-wrap:wrap;gap:6px;max-width:min(600px, 88vw);}
  .genre-filter-btn{
    background:var(--bg-raised);border:1px solid var(--line);color:var(--text);
    padding:9px 14px;border-radius:7px;font-size:13px;cursor:pointer;font-family:'IBM Plex Sans';
  }
  .genre-filter-btn:hover{border-color:var(--gold-dim);}
  #genreFilterCount{color:var(--gold);font-family:'IBM Plex Mono';}
  .genre-chips-panel{
    position:absolute;top:calc(100% + 6px);left:0;z-index:20;background:var(--bg-raised);
    border:1px solid var(--line);border-radius:10px;padding:14px;max-width:min(640px, 92vw);
    max-height:min(70vh, 520px);overflow-y:auto;
    box-shadow:0 12px 30px rgba(0,0,0,0.4);
  }
  .genre-chips-panel.hidden{display:none;}
  .chip{
    border:1px solid var(--line);padding:6px 12px;border-radius:999px;font-size:12.5px;
    cursor:pointer;color:var(--text-dim);user-select:none;transition:all .15s;
  }
  .chip:hover{border-color:var(--gold-dim);color:var(--text);}
  .chip.active{background:var(--gold);border-color:var(--gold);color:#1a1200;font-weight:600;}
  .range-row{display:flex;align-items:center;gap:8px;}
  .range-row input[type=range]{accent-color:var(--gold);width:130px;}
  .range-val{font-family:'IBM Plex Mono';font-size:12.5px;color:var(--gold);min-width:28px;}
  button.go{
    background:var(--gold);color:#1a1200;border:none;padding:10px 22px;border-radius:7px;
    font-weight:600;cursor:pointer;font-size:13.5px;letter-spacing:.3px;
  }
  button.go:hover{background:#f0c165;}
  button.go:disabled{opacity:.5;cursor:default;}
  button.clear{
    background:transparent;border:1px solid var(--line);color:var(--text-dim);padding:10px 18px;
    border-radius:7px;cursor:pointer;font-size:13.5px;font-family:'IBM Plex Sans';
  }
  button.clear:hover{border-color:var(--danger);color:var(--danger);}

  .meta-row{display:flex;justify-content:space-between;align-items:center;margin:22px 0 14px;}
  .meta-row .count{color:var(--text-dim);font-size:13px;font-family:'IBM Plex Mono';}
  .sortfield select{background:var(--bg-raised);border:1px solid var(--line);color:var(--text);padding:8px 10px;border-radius:7px;font-size:12.5px;}

  .view-toggle{display:flex;gap:4px;background:var(--bg-raised);border:1px solid var(--line);border-radius:7px;padding:3px;}
  .view-toggle button{
    background:transparent;border:none;color:var(--text-dim);padding:6px 12px;border-radius:5px;
    cursor:pointer;font-size:12.5px;font-family:'IBM Plex Sans';
  }
  .view-toggle button.active{background:var(--gold);color:#1a1200;font-weight:600;}

  .toggle-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-dim);}
  .toggle-row input{accent-color:var(--gold);width:15px;height:15px;cursor:pointer;flex-shrink:0;}
  .toggle-row label{cursor:pointer;}
  .panel-toggle label{
    display:inline !important;text-transform:none !important;font-size:12.5px !important;
    color:var(--text-dim) !important;margin-bottom:0 !important;white-space:normal !important;
    overflow:visible !important;text-overflow:clip !important;width:auto !important;letter-spacing:normal !important;
  }
  .panel-toggle{border-top:1px solid var(--line);margin-top:12px;padding-top:12px;}

  .active-filters-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .active-filter-chip{
    display:inline-flex;align-items:center;gap:6px;background:rgba(232,179,74,0.12);
    border:1px solid rgba(232,179,74,0.4);color:var(--gold);padding:5px 10px;border-radius:20px;
    font-size:12px;
  }
  .active-filter-chip button{
    background:transparent;border:none;color:var(--gold);cursor:pointer;font-size:13px;line-height:1;padding:0;
  }
  .active-filter-chip button:hover{color:#fff;}

  .grid{
    display:grid;grid-template-columns:repeat(auto-fill, minmax(190px, 1fr));gap:20px;
  }
  .grid.list-mode{
    display:flex;flex-direction:column;gap:8px;
  }
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
    display:flex;flex-direction:column;transition:transform .18s, border-color .18s;cursor:pointer;
  }
  .card:hover{transform:translateY(-3px);border-color:var(--gold-dim);}
  .rank{display:none;}
  .stremio-inline{
    display:inline-flex;align-items:center;gap:3px;color:var(--teal);text-decoration:none;
    font-size:11px;font-weight:600;white-space:nowrap;
  }
  .stremio-inline:hover{color:var(--gold);}

  .list-mode .card{
    flex-direction:row;align-items:center;transform:none !important;
    padding:14px 22px 14px 14px;gap:18px;
  }
  .list-mode .card:hover{transform:none !important;border-color:var(--gold-dim);}
  .list-mode .rank{
    display:flex;align-items:center;justify-content:center;flex:0 0 44px;
    font-family:'IBM Plex Mono';font-weight:600;color:var(--text-dim);font-size:18px;
  }
  .list-mode .poster-wrap{width:76px;flex:0 0 76px;aspect-ratio:2/3;border-radius:8px;overflow:hidden;}
  .list-mode .badges{display:none;}
  .list-mode .card-body{
    flex-direction:row;align-items:center;padding:0;flex:1;gap:0;min-width:0;
  }
  .list-mode .card-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;}
  .list-mode .card-title{
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:20px;
  }
  .list-mode .card-sub{
    display:flex;align-items:center;gap:12px;font-size:13.5px;color:var(--text-dim);
  }
  .list-mode .rating-box{
    flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px;margin-left:16px;
  }
  .list-mode .rating-line{display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono';font-size:17px;white-space:nowrap;}
  .list-mode .rating-line .star{color:var(--gold);font-size:17px;}
  .list-mode .rating-line.imdb-line{color:var(--gold);font-weight:700;}
  .list-mode .rating-line.meta-line{color:#6cb35a;font-size:13px;min-height:16px;}
  .list-mode .rating-line.tmdb-line{color:var(--text-dim);font-size:12px;opacity:.75;}

  .poster-wrap{position:relative;aspect-ratio:2/3;background:#0f1216;}
  .poster-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
  .poster-wrap .noimg{
    display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);
    font-family:'Fraunces';font-style:italic;font-size:13px;text-align:center;padding:10px;
  }
  .badges{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;gap:6px;}
  .badge{
    font-family:'IBM Plex Mono';font-size:11px;font-weight:600;padding:3px 7px;border-radius:5px;
    backdrop-filter:blur(4px);display:flex;align-items:center;gap:4px;
  }
  .badge.imdb{background:rgba(232,179,74,0.92);color:#1a1200;}
  .badge.tmdb{background:rgba(255,255,255,0.1);color:var(--text-dim);}
  .badge.pending{background:rgba(255,255,255,0.12);color:var(--text-dim);}
  .badge.age{background:rgba(90,154,161,0.2);color:var(--teal);border:1px solid rgba(90,154,161,0.4);}
  .badge.meta{background:rgba(108,179,90,0.2);color:#6cb35a;border:1px solid rgba(108,179,90,0.4);}
  .badge.meta:empty{display:none;}
  .rating-box{display:none;}
  .card-body{padding:12px 13px 14px;display:flex;flex-direction:column;gap:5px;flex:1;}
  .card-title{font-family:'Fraunces';font-weight:600;font-size:15.5px;line-height:1.25;}
  .card-sub{font-size:12px;color:var(--text-dim);font-family:'IBM Plex Mono';}

  .state{padding:60px 20px;text-align:center;color:var(--text-dim);}
  .state .icon{font-size:32px;margin-bottom:10px;}
  .state.error{color:var(--danger);}

  .load-more-row{display:flex;justify-content:center;margin-top:28px;}
  button.loadmore{
    background:transparent;border:1px solid var(--gold-dim);color:var(--gold);padding:10px 26px;border-radius:7px;
    font-weight:600;cursor:pointer;font-size:13px;letter-spacing:.3px;
  }
  button.loadmore:hover{background:rgba(232,179,74,0.1);}
  button.loadmore:disabled{opacity:.5;cursor:default;}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(5,6,8,0.82);backdrop-filter:blur(3px);
    display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;
  }
  .modal-overlay.hidden{display:none;}
  .modal{
    background:var(--card);border:1px solid var(--line);border-radius:14px;max-width:860px;width:100%;
    max-height:86vh;overflow-y:auto;position:relative;
  }
  .modal-close{
    position:absolute;top:12px;right:14px;background:rgba(0,0,0,0.4);border:none;color:var(--text);
    width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;z-index:2;
  }
  .modal-hero{display:flex;gap:26px;padding:28px;border-bottom:1px solid var(--line);}
  .modal-hero img.modal-poster-img{width:165px;border-radius:8px;flex:0 0 165px;}
  .modal-hero .noimg{width:165px;height:248px;flex:0 0 165px;background:#0f1216;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-family:'Fraunces';font-style:italic;font-size:12px;text-align:center;padding:6px;}
  .modal-title{font-family:'Fraunces';font-weight:700;font-size:25px;margin:0 0 4px;}
  .modal-greek-title{font-size:12px;color:var(--text-dim);margin-bottom:8px;font-style:italic;}
  .modal-meta{font-family:'IBM Plex Mono';font-size:12px;color:var(--text-dim);margin-bottom:10px;}
  .modal-upcoming{
    display:inline-block;background:rgba(232,179,74,0.15);border:1px solid rgba(232,179,74,0.4);
    color:var(--gold);font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px;margin-bottom:10px;
  }
  .modal-badges{display:flex;gap:8px;margin-bottom:10px;}
  .modal-genres{font-size:12px;color:var(--teal);}
  .modal-credits{margin-top:8px;display:flex;flex-direction:column;gap:3px;}
  .modal-credits div{font-size:11.5px;color:var(--text-dim);}
  .credits-label{color:var(--text);font-weight:600;}
  .modal-providers{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .providers-label{font-size:10.5px;color:var(--text-dim);margin-right:2px;}
  .provider-logo{width:38px;height:38px;border-radius:8px;background:#fff;padding:2px;object-fit:contain;}
  .provider-chip{
    background:rgba(108,179,90,0.15);border:1px solid rgba(108,179,90,0.4);color:#6cb35a;
    padding:6px 12px;border-radius:16px;font-size:11.5px;font-weight:600;
  }
  .modal-body{padding:22px 26px;}
  .modal-overview{font-size:14px;line-height:1.6;color:var(--text);}
  .modal-loading{padding:40px;text-align:center;color:var(--text-dim);}
  .modal-recs-title{
    font-family:'Fraunces';font-weight:600;font-size:15px;margin:22px 0 10px;color:var(--text);
  }
  .modal-recs-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;}
  .rec-card{flex:0 0 92px;cursor:pointer;}
  .rec-card img{width:92px;height:138px;object-fit:cover;border-radius:6px;display:block;}
  .rec-noimg{
    width:92px;height:138px;background:#0f1216;border-radius:6px;display:flex;align-items:center;
    justify-content:center;text-align:center;font-size:10.5px;color:var(--text-dim);padding:4px;
    font-family:'Fraunces';font-style:italic;
  }
  .rec-title{font-size:11px;color:var(--text-dim);margin-top:5px;line-height:1.3;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .rec-card:hover .rec-title{color:var(--gold);}
  .season-select{
    background:var(--bg-raised);border:1px solid var(--line);color:var(--text);
    padding:8px 10px;border-radius:7px;font-size:13px;margin-bottom:10px;
  }
  .episodes-list{display:flex;flex-direction:column;gap:1px;margin-bottom:20px;max-height:280px;overflow-y:auto;}
  .episode-row{
    display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg-raised);
    border-radius:6px;font-size:12.5px;
  }
  .episode-num{font-family:'IBM Plex Mono';color:var(--text-dim);flex:0 0 30px;}
  .episode-title{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .episode-rating{font-family:'IBM Plex Mono';color:var(--teal);flex:0 0 auto;}
  .episode-stremio{
    color:var(--teal);text-decoration:none;font-size:10.5px;font-weight:600;flex:0 0 auto;
    opacity:.85;white-space:nowrap;
  }
  .episode-stremio:hover{opacity:1;color:var(--gold);}
  .trailer-link{
    display:inline-flex;align-items:center;gap:6px;background:var(--gold);color:#1a1200;
    padding:9px 18px;border-radius:7px;font-weight:600;font-size:13px;text-decoration:none;
    margin-bottom:16px;margin-right:8px;
  }
  .trailer-link:hover{background:#f0c165;}
  .netflix-link{
    display:inline-flex;align-items:center;gap:6px;background:#E50914;color:#fff;
    padding:9px 18px;border-radius:7px;font-weight:600;font-size:13px;text-decoration:none;
    margin-bottom:16px;margin-right:8px;
  }
  .netflix-link:hover{background:#c40812;}
  .modal-share-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .share-chip{
    display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;
    background:var(--bg-raised);border:1.5px solid var(--line);color:var(--text-dim);border-radius:50%;
  }
  .share-chip svg{width:26px;height:26px;}
  .share-chip:hover{border-color:var(--gold-dim);}
  .share-chip.whatsapp{border-color:#25D366;color:#25D366;}
  .share-chip.whatsapp:hover{background:rgba(37,211,102,0.12);}
  .share-chip.viber{border-color:#7360F2;color:#7360F2;}
  .share-chip.viber:hover{background:rgba(115,96,242,0.12);}

async function getMovieCertification(tmdbId){
  try{
    const data = await tmdbFetch(`/movie/${tmdbId}/release_dates`);
    const gb = (data.results || []).find(r => r.country_code === 'GB');
    if(!gb || !gb.release_dates.length) return null;
    const withCert = gb.release_dates.find(rd => rd.certification);
    return withCert ? withCert.certification : null;
  }catch(e){
    return null;
  }
}

async function tmdbFetch(path, params={}){
  const url = new URL(`https://api.themoviedb.org/3${path}`);
  url.searchParams.set('api_key', TMDB_API_KEY);
  url.searchParams.set('language', params.language || 'el-GR');
  for(const [k,v] of Object.entries(params)){
    if(k === 'language') continue;
    if(v !== '' && v !== undefined && v !== null) url.searchParams.set(k, v);
  }
  const res = await fetch(url);
  if(!res.ok) throw new Error('TMDB_ERROR_' + res.status);
  return res.json();
}

async function loadGenres(){

function formatVoteCount(n){
  if(n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if(n >= 1000) return (n/1000).toFixed(0) + 'K';
  return String(n);
}

async function fetchWatchmodeProviders(tmdbId, mediaType){
  try{
    const searchField = mediaType === 'movie' ? 'tmdb_movie_id' : 'tmdb_tv_id';
    const searchRes = await fetch(`https://api.watchmode.com/v1/search/?apiKey=${WATCHMODE_API_KEY}&search_field=${searchField}&search_value=${tmdbId}`);
    const searchData = await searchRes.json();
    const match = searchData.title_results && searchData.title_results[0];
    if(!match) return null;
    const sourcesRes = await fetch(`https://api.watchmode.com/v1/title/${match.id}/sources/?apiKey=${WATCHMODE_API_KEY}&regions=GR`);
    const sources = await sourcesRes.json();
    if(!Array.isArray(sources)) return null;
    const relevant = sources.filter(s => s.region === 'GR' && (s.type === 'sub' || s.type === 'free'));
    const seen = new Set();
    const unique = [];
    for(const s of relevant){
      if(!seen.has(s.name)){ seen.add(s.name); unique.push(s.name); }
    }
    return unique.length ? unique : null;
  }catch(e){
    return null;
  }
}

async function omdbFetchJson(urlWithoutKey){
  for(let attempt = 0; attempt < OMDB_API_KEYS.length; attempt++){
    try{
      const res = await fetch(`${urlWithoutKey}&apikey=${currentOmdbKey()}`);
      const d = await res.json();
      if(d.Response === 'False' && d.Error && /limit/i.test(d.Error)){
        // αυτό το κλειδί τελείωσε το ημερήσιο όριό του, πέρνα στο επόμενο
        if(advanceOmdbKey()) continue;
        state.omdbLimitReached = true; // εξαντλήθηκαν όλα τα κλειδιά
        return null;
      }
      return d;
    }catch(e){
      return null;
    }
  }
  state.omdbLimitReached = true;
  return null;
}

async function fetchRatingsByTitleYear(title, year){
  const d = await omdbFetchJson(`https://www.omdbapi.com/?t=${encodeURIComponent(title)}${year ? `&y=${year}` : ''}`);
  if(!d || d.Response === 'False') return { imdbRating: null, metascore: null };
  return {
    imdbRating: d.imdbRating && d.imdbRating !== 'N/A' ? d.imdbRating : null,
    metascore: d.Metascore && d.Metascore !== 'N/A' ? d.Metascore : null,
  };
}

async function fetchRatings(tmdbId, mediaTypeOverride){
  try{
    const mt = mediaTypeOverride || state.mediaType;
    const extUrl = `https://api.themoviedb.org/3/${mt}/${tmdbId}/external_ids?api_key=${TMDB_API_KEY}`;
    const extRes = await fetch(extUrl);
    const ext = await extRes.json();
    const imdbId = ext.imdb_id;
    if(!imdbId) return { imdbRating: null, metascore: null };
    const d = await omdbFetchJson(`https://www.omdbapi.com/?i=${imdbId}`);
    if(!d || d.Response === 'False') return { imdbRating: null, metascore: null };
    return {
      imdbRating: d.imdbRating && d.imdbRating !== 'N/A' ? d.imdbRating : null,
      metascore: d.Metascore && d.Metascore !== 'N/A' ? d.Metascore : null,
    };
  }catch(e){
    return { imdbRating: null, metascore: null };
  }
}

async function enrichWithImdb(items){
  for(const item of items){
    if(item._imdbRating !== undefined) continue; // ήδη φορτωμένο (ταξινόμηση IMDb/Metascore)
    const t = item.title || item.name || '';
    const y = (item.release_date || item.first_air_date || '').slice(0,4);
    const itemMediaType = item._mediaTypeOverride || state.mediaType;
    fetchRatingsByTitleYear(t, y).then(async (result) => {
      if(!result.imdbRating){
        // fallback: πιο ακριβής αναζήτηση μέσω πραγματικού IMDb ID (πιο αργό, μόνο όταν χρειάζεται)
        const fallback = await fetchRatings(item.id, itemMediaType);
        if(fallback.imdbRating || fallback.metascore) result = fallback;
      }
      const { imdbRating, metascore } = result;
      const slot = document.querySelector(`[data-imdb-slot="${item.id}"]`);
      const line = document.querySelector(`[data-imdb-line="${item.id}"]`);
      const metaSlot = document.querySelector(`[data-meta-slot="${item.id}"]`);
      const text = imdbRating ? `IMDb ${imdbRating}` : 'IMDb —';
      if(slot){
        slot.textContent = text;
        if(imdbRating){ slot.classList.remove('pending'); slot.classList.add('imdb'); }
      }
      if(line){
        line.innerHTML = `<span class="star">★</span> ${text}`;
      }
      if(metaSlot){
        metaSlot.textContent = metascore ? `Metascore ${metascore}` : '';
      }
    });
  }
}

async function fetchRawPage(page, overrideSortBy){
  const q = els.query.value.trim();
  const sortMode = overrideSortBy || els.sortBy.value;
  const isRatingSort = sortMode === 'imdb_rating' || sortMode === 'metascore';
  const isTrending = sortMode === 'trending';
  const useClientFilters = !!q || isTrending;
  let data;
  if(q){
    data = await tmdbFetch(`/search/${state.mediaType}`, { query: q, page, language: 'en-US' });
  } else if(isTrending){
    data = await tmdbFetch(`/trending/${state.mediaType}/week`, { page, language: 'en-US' });
  } else {
    const params = {
      sort_by: isRatingSort ? 'vote_count.desc' : sortMode,
      page,
      'vote_count.gte': isRatingSort ? 100 : 20,
      language: 'en-US',
    };
    if(state.selectedGenres.size) params.with_genres = Array.from(state.selectedGenres).join(',');
    if(state.langFilter) params.with_original_language = state.langFilter;
    const dateField = state.mediaType === 'movie' ? 'primary_release_date' : 'first_air_date';
    if(els.dateFrom.value) params[`${dateField}.gte`] = `${els.dateFrom.value}-01-01`;
    if(els.dateTo.value) params[`${dateField}.lte`] = `${els.dateTo.value}-12-31`;
    if(state.mediaType === 'movie' && els.ageLimit.value){
      params.certification_country = 'GB';
      params['certification.lte'] = els.ageLimit.value;
    }
    data = await tmdbFetch(`/discover/${state.mediaType}`, params);
  }

  let results = data.results || [];
  if(useClientFilters){
    if(state.selectedGenres.size){
      results = results.filter(r => (r.genre_ids||[]).some(g => state.selectedGenres.has(String(g))));
    }
    const yFrom = els.dateFrom.value ? parseInt(els.dateFrom.value) : null;
    const yTo = els.dateTo.value ? parseInt(els.dateTo.value) : null;
    if(yFrom || yTo){
      results = results.filter(r => {
        const d = r.release_date || r.first_air_date || '';
        if(!d) return false;
        const y = parseInt(d.slice(0,4));
        if(yFrom && y < yFrom) return false;
        if(yTo && y > yTo) return false;
        return true;
      });
    }
  }
  results = filterLanguages(results);

  if(state.mediaType === 'movie' && els.ageLimit.value && useClientFilters){
    const threshold = AGE_ORDER[els.ageLimit.value];
    const certs = await Promise.all(results.map(r => getMovieCertification(r.id)));
    results = results.filter((r, i) => {
      const cert = certs[i];
      if(!cert) return false; // χωρίς γνωστή σήμανση, το αποκλείουμε για ασφάλεια
      const order = AGE_ORDER[cert];
      return order !== undefined && order <= threshold;
    });
  }

  return { results, totalPages: data.total_pages || 1 };
}

const RATING_POOL_PAGES = 8; // ~160 πιο γνωστοί τίτλοι — σταθερή δεξαμενή

async function fetchEnrichedPool(){
  const sortMode = els.sortBy.value;
  const isRatingSort = sortMode === 'imdb_rating' || sortMode === 'metascore';
  const key = sortMode === 'imdb_rating' ? '_imdbRating' : '_metascore';
  const minRating = parseFloat(els.minRating.value) || 0;
  const q = els.query.value.trim();
  const pagesToFetch = q ? [1, 2, 3] : Array.from({length: RATING_POOL_PAGES}, (_, i) => i + 1);

  const hasYearFilter = !!(els.dateFrom.value || els.dateTo.value);

  // Λογική δεξαμενής:
  // - Ταξινόμηση IMDb/Metascore: πάντα σταθερή δεξαμενή γνωστών τίτλων (vote_count.desc),
  //   απαραίτητο για σωστή global ταξινόμηση.
  // - Trending τώρα + ελάχιστο rating, ΧΩΡΙΣ φίλτρο ετών: σεβόμαστε το Trending κανονικά,
  //   απλά φιλτράρουμε τα αποτελέσματά του με το ελάχιστο rating.
  // - Trending τώρα + φίλτρο ετών: το Trending δεν καλύπτει παλιές χρονιές, οπότε πέφτουμε
  //   πίσω σε vote_count.desc ώστε να βρίσκει πραγματικά αποτελέσματα.
  // - Νεότερες: σεβόμαστε την ταξινόμηση όπως είναι (ήδη υποστηρίζει φίλτρο ετών σωστά).
  let poolSortOverride;
  if(isRatingSort){
    poolSortOverride = 'vote_count.desc';
  } else if(minRating > 0 && sortMode === 'trending' && hasYearFilter){
    poolSortOverride = 'vote_count.desc';
  } else {
    poolSortOverride = undefined; // σεβόμαστε την επιλεγμένη ταξινόμηση (Trending / Νεότερες)
  }
  const pageResults = await Promise.all(pagesToFetch.map(p => fetchRawPage(p, poolSortOverride).catch(() => ({ results: [] }))));
  let pool = [];
  const seenIds = new Set();
  for(const pr of pageResults){
    for(const item of pr.results){
      if(!seenIds.has(item.id)){
        seenIds.add(item.id);
        pool.push(item);
      }
    }
  }

  const ratings = await Promise.all(pool.map(r => {
    const t = r.title || r.name || '';
    const y = (r.release_date || r.first_air_date || '').slice(0,4);
    return fetchRatingsByTitleYear(t, y);
  }));
  pool.forEach((r, i) => {
    r._imdbRating = ratings[i].imdbRating ? parseFloat(ratings[i].imdbRating) : null;
    r._metascore = ratings[i].metascore ? parseInt(ratings[i].metascore) : null;
  });

  if(minRating > 0){
    pool = pool.filter(r => r._imdbRating !== null && r._imdbRating >= minRating);
  }
  if(isRatingSort){
    pool = pool.filter(r => r[key] !== null).sort((a, b) => b[key] - a[key]);
  }
  return pool;
}

function isRatingSortMode(){
  return els.sortBy.value === 'imdb_rating' || els.sortBy.value === 'metascore';
}
function needsPool(){
  return isRatingSortMode() || parseFloat(els.minRating.value) > 0;
}

async function runSearch(){
  state.viewingWatchlist = false;
  updateWatchlistBtn();
  els.goBtn.disabled = true;
  setState('loading');
  els.resultCount.textContent = '';
  els.loadMoreRow.style.display = 'none';
  state.currentPage = 1;
  state.ratingPool = null;
  state.omdbLimitReached = false;
  state.seenResultIds = new Set();

  try{
    let results, totalPages;
    if(needsPool()){
      const pool = await fetchEnrichedPool();
      state.ratingPool = pool;
      results = pool.slice(0, 20);
      totalPages = Math.max(1, Math.ceil(pool.length / 20));
    } else {
      ({ results, totalPages } = await fetchRawPage(1));
    }
    results = results.filter(r => {
      if(state.seenResultIds.has(r.id)) return false;
      state.seenResultIds.add(r.id);
      return true;
    });
    state.totalPages = totalPages;
    state.lastResults = results;

    if(!results.length){
      if(state.omdbLimitReached){
        setState('error', 'Το OMDb (πηγή για IMDb rating/Metascore) έχει φτάσει το ημερήσιο όριο των 1.000 αιτημάτων του δωρεάν πλάνου. Δοκίμασε ξανά αύριο, ή προσωρινά χρησιμοποίησε ταξινόμηση "Δημοφιλία" χωρίς ελάχιστο IMDb rating.');
      } else {
        setState('empty', 'Δεν βρέθηκαν αποτελέσματα με αυτά τα φίλτρα. Δοκίμασε να χαλαρώσεις κάποιο φίλτρο.');
      }
      return;
    }

    els.results.innerHTML = '';
    els.resultCount.textContent = `${results.length} αποτελέσματα (σελίδα 1 από ${totalPages})`;
    renderResultsSkeleton(results);
    enrichWithImdb(results);

    if(state.currentPage < state.totalPages){
      els.loadMoreRow.style.display = 'flex';
    }
  }catch(e){
    setState('error', 'Κάτι πήγε στραβά με το αίτημα. Δοκίμασε ξανά σε λίγο.');
  } finally {
    els.goBtn.disabled = false;
  }
}

async function loadMore(){
  els.loadMoreBtn.disabled = true;
  els.loadMoreBtn.textContent = 'Φόρτωση...';
  try{
    state.currentPage += 1;
    let results;
    if(needsPool() && state.ratingPool){
      const start = (state.currentPage - 1) * 20;
      results = state.ratingPool.slice(start, start + 20);
    } else {
      ({ results } = await fetchRawPage(state.currentPage));
    }
    results = results.filter(r => {
      if(state.seenResultIds.has(r.id)) return false;
      state.seenResultIds.add(r.id);
      return true;
    });
    state.lastResults = state.lastResults.concat(results);
    renderResultsSkeleton(results, true);
    enrichWithImdb(results);
    els.resultCount.textContent = `${state.lastResults.length} αποτελέσματα (σελίδα ${state.currentPage} από ${state.totalPages})`;
    if(state.currentPage >= state.totalPages){
      els.loadMoreRow.style.display = 'none';
    }
  }catch(e){
    // αν αποτύχει, απλά άσε το κουμπί ενεργό για νέα προσπάθεια
  } finally {
    els.loadMoreBtn.disabled = false;
    els.loadMoreBtn.textContent = 'Φόρτωση περισσότερων';
  }
}

async function autoLoadTrendingPreview(){
  // Δωρεάν προεπισκόπηση: μόνο TMDb δεδομένα, ΚΑΘΟΛΟΥ κλήσεις στο OMDb.
  // Μόλις ο χρήστης πατήσει "Αναζήτηση", η κανονική ροή (με IMDb) αναλαμβάνει κανονικά.
  try{
    const { results } = await fetchRawPage(1);
    if(!results.length) return;
    state.currentPage = 1;
    state.lastResults = results;
    state.seenResultIds = new Set(results.map(r => r.id));

    els.resultCount.textContent = `${results.length} αποτελέσματα`;
    renderResultsSkeleton(results);
    // Σκόπιμα ΔΕΝ καλούμε enrichWithImdb εδώ.
  }catch(e){
    // αν αποτύχει, απλά μένει η αρχική κενή κατάσταση — καμία ζημιά
  }
}

function openAuthModal(){ els.authOverlay.classList.remove('hidden'); }
function closeAuthModal(){ els.authOverlay.classList.add('hidden'); }
els.authClose.addEventListener('click', closeAuthModal);
els.authOverlay.addEventListener('click', (e) => { if(e.target === els.authOverlay) closeAuthModal(); });

async function renderAuthScreen(){
  els.authContent.innerHTML = '<div class="modal-loading">Φόρτωση...</div>';
  const names = await supaWatchlistFetchNames();
  els.authContent.innerHTML = `
    <div class="auth-title">Σύνδεση σε προφίλ</div>
    ${names.length ? `
      <div class="auth-section">
        <span class="auth-label">Υπάρχοντα προφίλ</span>
        <div class="profile-pill-list" id="profilePillList">
          ${names.map(n => `<button class="profile-pill" data-name="${n}">${n}</button>`).join('')}
        </div>
      </div>
      <div class="auth-divider">ή</div>
    ` : ''}
    <div class="auth-section">
      <span class="auth-label">Δημιουργία νέου προφίλ</span>
      <input type="text" class="auth-input" id="newProfileName" placeholder="Όνομα (π.χ. Γιώργος)" maxlength="20">
      <input type="password" class="auth-input" id="newProfilePin" placeholder="4ψήφιο PIN" maxlength="4" inputmode="numeric">
      <button class="auth-btn" id="createProfileBtn">Δημιουργία</button>
      <div class="auth-error" id="authError"></div>
    </div>
  `;
  document.querySelectorAll('.profile-pill').forEach(pill => {
    pill.addEventListener('click', () => promptPinLogin(pill.dataset.name));
  });
  document.getElementById('createProfileBtn').addEventListener('click', handleCreateProfile);
}

function promptPinLogin(name){
  els.authContent.innerHTML = `
    <div class="auth-title">Σύνδεση: ${name}</div>
    <div class="auth-section">
      <span class="auth-label">PIN</span>
      <input type="password" class="auth-input" id="loginPin" placeholder="4ψήφιο PIN" maxlength="4" inputmode="numeric" autofocus>
      <button class="auth-btn" id="loginBtn">Σύνδεση</button>
      <button class="auth-btn secondary" id="backToAuthBtn">← Πίσω</button>
      <div class="auth-error" id="authError"></div>
    </div>
  `;
  document.getElementById('backToAuthBtn').addEventListener('click', renderAuthScreen);
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const pin = document.getElementById('loginPin').value.trim();
    const errEl = document.getElementById('authError');
    const row = await supaWatchlistFetchProfile(name);
    if(row && row.pin === pin){
      loginAs(name, row);
    } else {
      errEl.textContent = 'Λάθος PIN.';
    }
  });
  document.getElementById('loginPin').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') document.getElementById('loginBtn').click();
  });
}

async function handleCreateProfile(){
  const name = document.getElementById('newProfileName').value.trim();
  const pin = document.getElementById('newProfilePin').value.trim();
  const errEl = document.getElementById('authError');
  if(!name || !/^\d{4}$/.test(pin)){
    errEl.textContent = 'Βάλε όνομα και 4ψήφιο PIN (μόνο αριθμοί).';
    return;
  }
  const existing = await supaWatchlistFetchProfile(name);
  if(existing){
    errEl.textContent = 'Υπάρχει ήδη προφίλ με αυτό το όνομα.';
    return;
  }
  const ok = await supaWatchlistCreate(name, pin);
  if(ok){
    loginAs(name, { profile_name: name, items: '[]' });
  } else {
    errEl.textContent = 'Κάτι πήγε στραβά, δοκίμασε ξανά.';
  }
}

function loginAs(name, row){
  state.profileName = name;
  localStorage.setItem(PROFILE_STORAGE_KEY, name);
  try{ state.watchlistItems = JSON.parse(row.items || '[]'); }catch(e){ state.watchlistItems = []; }
  state.watchlistIds = new Set(state.watchlistItems.map(it => wlKey(it.id, it.mediaType)));
  updateProfileBtn();
  closeAuthModal();
}

function logout(){
  state.profileName = null;
  state.watchlistItems = [];
  state.watchlistIds = new Set();
  state.viewingWatchlist = false;
  localStorage.removeItem(PROFILE_STORAGE_KEY);
  updateProfileBtn();
  updateWatchlistBtn();
}

function updateProfileBtn(){
  els.profileBtn.textContent = state.profileName ? `👤 ${state.profileName} ▾` : '👤 Σύνδεση';
}

els.profileBtn.addEventListener('click', () => {
  if(state.profileName){
    // ήδη συνδεδεμένος: μενού απλό με confirm για αποσύνδεση
    if(confirm(`Αποσύνδεση από «${state.profileName}»;`)) logout();
  } else {
    renderAuthScreen();
    openAuthModal();
  }
});

async function restoreProfileSession(){
  const savedName = localStorage.getItem(PROFILE_STORAGE_KEY);
  if(!savedName) return;
  const row = await supaWatchlistFetchProfile(savedName);
  if(row){
    state.profileName = savedName;
    try{ state.watchlistItems = JSON.parse(row.items || '[]'); }catch(e){ state.watchlistItems = []; }
    state.watchlistIds = new Set(state.watchlistItems.map(it => wlKey(it.id, it.mediaType)));
    updateProfileBtn();
  }
}

async function toggleWatchlist(item){
  if(!state.profileName){
    renderAuthScreen();
    openAuthModal();
    return;
  }
  const key = wlKey(item.id, item.mediaType || state.mediaType);
  if(state.watchlistIds.has(key)){
    state.watchlistIds.delete(key);
    state.watchlistItems = state.watchlistItems.filter(it => wlKey(it.id, it.mediaType) !== key);
  } else {
    state.watchlistIds.add(key);
    state.watchlistItems.unshift({
      id: item.id,
      mediaType: item.mediaType || state.mediaType,
      title: item.title,
      poster_path: item.poster_path || null,
      date: item.date || '',
      vote_average: item.vote_average || null,
    });
  }
  await supaWatchlistSave(state.profileName, state.watchlistItems);
  // ενημέρωση εικονιδίων στην τρέχουσα προβολή
  document.querySelectorAll(`[data-bookmark-key="${key}"]`).forEach(btn => {
    btn.classList.toggle('saved', state.watchlistIds.has(key));
    btn.textContent = state.watchlistIds.has(key) ? '✓' : '+';
  });
  if(state.viewingWatchlist) renderWatchlistView();
}

function updateWatchlistBtn(){
  els.watchlistBtn.classList.toggle('active', state.viewingWatchlist);
}

function renderWatchlistView(){
  state.viewingWatchlist = true;
  updateWatchlistBtn();
  els.loadMoreRow.style.display = 'none';
  if(!state.profileName){
    setState('empty', 'Συνδέσου σε προφίλ για να δεις τη watchlist σου.');
    els.resultCount.textContent = '';
    return;
  }
  if(!state.watchlistItems.length){
    setState('empty', 'Η watchlist σου είναι άδεια — πρόσθεσε τίτλους με το 🔖.');
    els.resultCount.textContent = '';
    return;
  }
  els.resultCount.textContent = `${state.watchlistItems.length} τίτλοι στη watchlist`;
  state.lastResults = state.watchlistItems;
  els.results.innerHTML = '';
  const mappedItems = state.watchlistItems.map(it => ({
    id: it.id, title: it.title, name: it.title, poster_path: it.poster_path,
    release_date: it.mediaType === 'movie' ? it.date : undefined,
    first_air_date: it.mediaType === 'tv' ? it.date : undefined,
    vote_average: it.vote_average, _mediaTypeOverride: it.mediaType,
  }));
  renderResultsSkeleton(mappedItems);
  enrichWithImdb(mappedItems);
}

els.watchlistBtn.addEventListener('click', () => {
  if(state.viewingWatchlist){
    state.viewingWatchlist = false;
    updateWatchlistBtn();
    runSearch();
  } else {
    renderWatchlistView();
  }
});

restoreProfileSession();

// ============================================================
// Πλοήγηση με τηλεκοντρόλ / πληκτρολόγιο (π.χ. Android TV)
// Γενικό σύστημα: βρίσκει το πλησιέστερο εστιάσιμο στοιχείο προς
// την κατεύθυνση του βέλους που πατήθηκε, με βάση τη θέση στην οθόνη.
// ============================================================

function isElementVisible(el){
  if(el.disabled) return false;
  const style = getComputedStyle(el);
  if(style.display === 'none' || style.visibility === 'hidden') return false;
  const rect = el.getBoundingClientRect();
  if(rect.width === 0 && rect.height === 0) return false;
  return true;
}

function getFocusableElements(){
  const modalOpen = !els.modalOverlay.classList.contains('hidden');
  const scope = modalOpen ? els.modalOverlay : document;
  return Array.from(scope.querySelectorAll('a[href], button:not(:disabled), input:not([type=hidden]), select, [tabindex="0"]'))
    .filter(el => {
      if(modalOpen && !el.closest('.modal') && el !== els.modalOverlay) return false;
      // κρυμμένο genre panel: μην εστιάζεις μέσα του αν είναι κλειστό
      const chipsPanel = document.getElementById('genreChipsPanel');
      if(chipsPanel && chipsPanel.classList.contains('hidden') && chipsPanel.contains(el)) return false;
      // κρυμμένο advanced filters panel σε mobile: μην εστιάζεις μέσα του αν είναι κλειστό
      const advFilters = document.getElementById('advancedFilters');
      if(advFilters && !advFilters.classList.contains('open') && getComputedStyle(advFilters).display === 'none' && advFilters.contains(el)) return false;
      return isElementVisible(el);
    });
}

function moveFocus(direction){
  const current = document.activeElement;
  const focusables = getFocusableElements();
  if(!focusables.length) return;
  if(!current || current === document.body || !focusables.includes(current)){
    focusables[0].focus();
    return;
  }
  const curRect = current.getBoundingClientRect();
  const curCenter = { x: curRect.left + curRect.width / 2, y: curRect.top + curRect.height / 2 };
  let best = null;
  let bestScore = Infinity;
  for(const el of focusables){
    if(el === current) continue;
    const r = el.getBoundingClientRect();
    const center = { x: r.left + r.width / 2, y: r.top + r.height / 2 };
    const dx = center.x - curCenter.x;
    const dy = center.y - curCenter.y;
    let primary, secondary, valid;
    if(direction === 'right'){ valid = dx > 4; primary = dx; secondary = Math.abs(dy); }
    else if(direction === 'left'){ valid = dx < -4; primary = -dx; secondary = Math.abs(dy); }
    else if(direction === 'down'){ valid = dy > 4; primary = dy; secondary = Math.abs(dx); }
    else if(direction === 'up'){ valid = dy < -4; primary = -dy; secondary = Math.abs(dx); }
    if(!valid) continue;
    const score = primary + secondary * 2.2;
    if(score < bestScore){ bestScore = score; best = el; }
  }
  if(best){
    best.focus();
    best.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

document.addEventListener('keydown', (e) => {
  const dirMap = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' };
  const active = document.activeElement;
  const tag = active ? active.tagName : '';

  if(dirMap[e.key]){
    // Άσε το native πλοήγηση μέσα σε select/range/text ώστε να μη «κλέβουμε» τα βέλη τους
    if(tag === 'SELECT') return;
    if(tag === 'INPUT' && active.type === 'range') return;
    if(tag === 'INPUT' && (active.type === 'text' || active.type === 'number') && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) return;
    e.preventDefault();
    moveFocus(dirMap[e.key]);
    return;
  }

  if(e.key === 'Enter' || e.key === ' '){
    if(active && (active.classList.contains('card') || active.classList.contains('chip') || active.classList.contains('rec-card'))){
      e.preventDefault();
      active.click();
    }
  }
});
